<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>나의 전생 동물은?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════
   TOSS DESIGN SYSTEM
   분석 기준:
   - bg: #F2F4F8 (연한 파란빛 회색)
   - card: #FFFFFF, radius 20px, shadow 미미하게
   - primary: #0064FF (토스블루) → 이 앱은 오렌지 테마 유지하되 레이아웃/공간감은 토스 따름
   - text-primary: #1A1D23
   - text-secondary: #8B95A1
   - border: 없음 (shadow로만)
   - 버튼: height 56px, radius 14px, 꽉 찬 solid
   - 여백: 넉넉하게, 숨 쉬는 공간
   - 일러스트: 중앙에 크게, 흰 배경 카드 위에
   - 별 파티클: 노란색 ✦
════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --blue:#0064FF;
  --orange:#FF6B35;
  --orange-light:#FFF3EE;
  --bg:#F2F4F8;
  --surface:#FFFFFF;
  --text-1:#1A1D23;
  --text-2:#4E5968;
  --text-3:#8B95A1;
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 4px 20px rgba(0,0,0,.09);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r-card:20px;
  --r-btn:14px;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Noto Sans KR',sans-serif;
  color:var(--text-1);
  -webkit-font-smoothing:antialiased;
}
.app{
  width:100%;height:100%;
  max-width:430px;margin:0 auto;
  position:relative;overflow:hidden;
}

/* ── SCREEN TRANSITIONS ── */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  transition:transform .4s cubic-bezier(.4,0,.2,1), opacity .35s ease;
}
.screen.hidden{transform:translateX(110%);opacity:0;pointer-events:none}
.screen.exit{transform:translateX(-24%);opacity:0;pointer-events:none}

/* ════════════════════════════════════
   START SCREEN
════════════════════════════════════ */
#s-start{
  background:var(--bg);
  padding-bottom:env(safe-area-inset-bottom,28px);
}

.start-top{
  padding:60px 24px 0;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 작은 태그 레이블 */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--orange-light);
  color:var(--orange);
  font-size:13px;font-weight:700;
  padding:7px 14px;border-radius:100px;
  margin-bottom:20px;
}

.start-title{
  font-size:34px;font-weight:900;
  line-height:1.25;text-align:center;
  letter-spacing:-.025em;
  color:var(--text-1);
  margin-bottom:10px;
}
.start-title em{font-style:normal;color:var(--orange)}
.start-desc{
  font-size:15px;color:var(--text-3);
  text-align:center;line-height:1.65;
}

/* 동물 프리뷰 카드 */
.preview-card{
  width:100%;
  background:var(--surface);
  border-radius:var(--r-card);
  padding:24px 20px;
  margin:28px 0 20px;
  box-shadow:var(--shadow-md);
  display:flex;flex-direction:column;align-items:center;
  gap:16px;
}
.preview-row{
  display:flex;gap:10px;align-items:center;justify-content:center;
}
.prev-bub{
  width:56px;height:56px;
  background:var(--bg);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  animation:float 3.5s ease-in-out infinite;
}
.prev-bub:nth-child(2){animation-delay:.2s}
.prev-bub:nth-child(3){animation-delay:.4s}
.prev-bub:nth-child(4){animation-delay:.6s}
.prev-bub:nth-child(5){animation-delay:.8s}
.prev-bub svg{width:100%;height:100%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

.preview-label{
  font-size:13px;color:var(--text-3);
  display:flex;align-items:center;gap:6px;
}
.preview-label strong{color:var(--text-2);font-weight:700}

/* 스파클 */
.sparkle{
  display:inline-block;
  color:#FFD700;
  animation:spin 4s linear infinite;
  font-style:normal;
}
@keyframes spin{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* 하단 버튼 */
.start-btns{
  padding:0 20px 20px;
  display:flex;flex-direction:column;gap:10px;
}
.btn-primary{
  width:100%;height:56px;
  background:var(--orange);color:#fff;
  border:none;border-radius:var(--r-btn);
  font-size:17px;font-weight:800;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(255,107,53,.3);
  transition:transform .12s, box-shadow .12s;
  letter-spacing:-.01em;
}
.btn-primary:active{transform:scale(.97);box-shadow:0 3px 8px rgba(255,107,53,.2)}
.btn-ghost{
  width:100%;height:48px;
  background:transparent;
  color:var(--text-3);
  border:1.5px solid #DDE1E8;
  border-radius:var(--r-btn);
  font-size:15px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
  transition:all .12s;
}
.btn-ghost:active{background:#EEF1F5;transform:scale(.97)}

/* ════════════════════════════════════
   QUESTION SCREEN
════════════════════════════════════ */
#s-q{background:var(--bg)}

.q-topbar{
  padding:52px 20px 0;
  background:var(--bg);
  position:sticky;top:0;z-index:10;
}
.prog-bar{display:flex;gap:5px;margin-bottom:4px}
.ps{
  flex:1;height:4px;
  background:#DDE1E8;
  border-radius:2px;overflow:hidden;
  transition:background .25s;
}
.ps.done{background:var(--orange)}
.ps.cur::after{
  content:'';display:block;height:100%;
  background:var(--orange);border-radius:2px;
  animation:pfill .35s ease forwards;
}
@keyframes pfill{from{width:0}to{width:50%}}

.q-num{font-size:12px;font-weight:700;color:var(--orange);margin:14px 0 0}

.q-body{padding:8px 20px 20px}
.q-icon-box{
  width:60px;height:60px;
  background:var(--orange-light);border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:14px;
}
.q-text{
  font-size:22px;font-weight:900;
  line-height:1.4;letter-spacing:-.02em;
  color:var(--text-1);
}

.opts{padding:4px 20px 48px;display:flex;flex-direction:column;gap:10px}
.opt{
  width:100%;
  background:var(--surface);
  border:2px solid transparent;
  border-radius:16px;
  padding:18px 16px;
  text-align:left;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow-sm);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
  opacity:0;
}
.opt:active{transform:scale(.97)}
.opt.sel{
  border-color:var(--orange);
  background:var(--orange-light);
  box-shadow:0 4px 16px rgba(255,107,53,.13);
  transform:scale(1.012);
}
.opt-icon{font-size:24px;width:30px;text-align:center;flex-shrink:0}
.opt-text{font-size:15px;font-weight:600;color:var(--text-1);line-height:1.4}

/* ════════════════════════════════════
   LOADING SCREEN
════════════════════════════════════ */
#s-load{
  background:var(--bg);
  align-items:center;justify-content:center;gap:18px;
}
.load-icon{font-size:80px;animation:loadbounce 1s ease-in-out infinite alternate}
@keyframes loadbounce{from{transform:scale(.88) rotate(-6deg)}to{transform:scale(1.08) rotate(6deg)}}
.load-title{font-size:20px;font-weight:800;color:var(--text-1);text-align:center;letter-spacing:-.02em}
.load-sub{font-size:14px;color:var(--text-3);text-align:center}
.dots{display:flex;gap:6px;margin-top:4px}
.dot{
  width:8px;height:8px;
  background:var(--orange);border-radius:50%;
  animation:dotpulse 1.1s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.18s}
.dot:nth-child(3){animation-delay:.36s}
@keyframes dotpulse{0%,100%{transform:scale(.5);opacity:.3}50%{transform:scale(1);opacity:1}}

/* ════════════════════════════════════
   RESULT SCREEN — 핵심 재설계
   토스 스타일: 흰 배경, 동물 크게, 카드 클린
════════════════════════════════════ */
#s-res{background:var(--bg)}

/* 상단 컬러 배너 (짧게) */
.res-banner{
  height:160px;
  position:relative;
  flex-shrink:0;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:52px;
}
.grade-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.28);
  border:1.5px solid rgba(255,255,255,.5);
  color:#fff;
  font-size:13px;font-weight:800;
  padding:7px 16px;border-radius:100px;
  letter-spacing:.04em;
  backdrop-filter:blur(8px);
  position:relative;z-index:2;
}

/* 동물 이미지 — 핵심: 흰 배경 원형, 배너 아래로 반쯤 나옴 */
.animal-wrapper{
  display:flex;
  justify-content:center;
  margin-top:-70px; /* 배너와 겹치게 */
  position:relative;
  z-index:10;
  flex-shrink:0;
}
.animal-ring{
  /* 바깥 링 (동물 색상으로 JS에서 설정) */
  width:156px;height:156px;
  border-radius:50%;
  padding:5px;
  box-shadow:var(--shadow-lg);
  animation:animbounce 3.5s ease-in-out infinite;
}
@keyframes animbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.animal-circle{
  /* 흰 배경 원 — SVG가 항상 보이도록 */
  width:100%;height:100%;
  border-radius:50%;
  background:#FFFFFF;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.animal-circle svg{
  width:100%;height:100%;
  display:block;
}

/* 이름 / 정보 섹션 */
.res-info{
  text-align:center;
  padding:14px 24px 20px;
  flex-shrink:0;
}
.res-sub-tag{font-size:13px;color:var(--text-3);margin-bottom:4px}
.res-name{
  font-size:38px;font-weight:900;
  color:var(--text-1);
  letter-spacing:-.025em;
  margin-bottom:8px;
  line-height:1.1;
}
.res-rarity{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface);
  border-radius:100px;
  padding:5px 14px;
  font-size:13px;font-weight:700;
  color:var(--text-2);
  box-shadow:var(--shadow-sm);
}
.rarity-dot{
  width:8px;height:8px;border-radius:50%;
  flex-shrink:0;
}

/* 정보 카드들 */
.res-cards{
  padding:0 18px;
  display:flex;flex-direction:column;gap:10px;
  flex-shrink:0;
}
.info-card{
  background:var(--surface);
  border-radius:var(--r-card);
  padding:20px;
  box-shadow:var(--shadow-sm);
  opacity:0;
  transform:translateY(16px);
  transition:opacity .4s ease, transform .4s cubic-bezier(.34,1.56,.64,1);
}
.info-card.show{opacity:1;transform:translateY(0)}

.card-label{
  font-size:11px;font-weight:800;
  color:var(--orange);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:12px;
}
.card-text{font-size:15px;color:var(--text-2);line-height:1.75}
.trait-list{display:flex;flex-direction:column;gap:10px}
.trait-item{
  display:flex;align-items:flex-start;gap:10px;
  font-size:15px;font-weight:500;
  color:var(--text-1);line-height:1.45;
}
.trait-bullet{
  width:7px;height:7px;
  background:var(--orange);border-radius:50%;
  flex-shrink:0;margin-top:7px;
}

/* 궁합 카드 */
.compat-row{display:flex;align-items:center;gap:14px}
.compat-img{
  width:60px;height:60px;
  border-radius:16px;
  background:var(--bg);
  overflow:hidden;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.compat-img svg{width:100%;height:100%}
.compat-name{font-size:18px;font-weight:900;color:var(--text-1);margin-bottom:4px}
.compat-desc{font-size:13px;color:var(--text-3);line-height:1.55}

/* 결과 버튼 */
.res-btns{
  padding:16px 18px 44px;
  display:flex;flex-direction:column;gap:10px;
  flex-shrink:0;
}

/* 스파클 장식 (배너 내부) */
.banner-spark{
  position:absolute;
  font-size:16px;color:#FFD700;
  pointer-events:none;z-index:1;
  animation:sparkle 2.5s ease-in-out infinite;
}
@keyframes sparkle{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
</style>
</head>
<body>
<div class="app">

<!-- ════════════ START ════════════ -->
<div class="screen" id="s-start">
  <div class="start-top">
    <span class="chip">🔮 전생 동물 테스트</span>
    <h1 class="start-title">
      전생에 나는<br><em>어떤 동물</em>이었을까?
    </h1>
    <p class="start-desc">5가지 질문으로 알아보는 나의 전생<br>총 24종 중 딱 하나가 나와요</p>

    <div class="preview-card">
      <div class="preview-row" id="preview-bubs"></div>
      <div class="preview-label">
        <i class="sparkle">✦</i>
        총 <strong>24종</strong> 중 하나 &nbsp;·&nbsp; 지금까지 <strong>12,847명</strong> 참여
        <i class="sparkle" style="animation-delay:.8s">✦</i>
      </div>
    </div>
  </div>

  <div class="start-btns">
    <button class="btn-primary" onclick="goQ()">🔮 전생 알아보기</button>
    <button class="btn-ghost" onclick="shareApp()">친구한테 물어보기 →</button>
  </div>
</div>

<!-- ════════════ QUESTION ════════════ -->
<div class="screen hidden" id="s-q">
  <div class="q-topbar">
    <div class="prog-bar">
      <div class="ps"></div><div class="ps"></div>
      <div class="ps"></div><div class="ps"></div><div class="ps"></div>
    </div>
    <div class="q-num" id="q-num">질문 1 / 5</div>
  </div>
  <div class="q-body">
    <div class="q-icon-box" id="q-icon">🌅</div>
    <h2 class="q-text" id="q-text"></h2>
  </div>
  <div class="opts" id="opts"></div>
</div>

<!-- ════════════ LOADING ════════════ -->
<div class="screen hidden" id="s-load">
  <div class="load-icon" id="load-icon">🔮</div>
  <div class="load-title" id="load-title">전생을 분석하는 중...</div>
  <div class="load-sub" id="load-sub">우주의 기억을 탐색하고 있어요</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- ════════════ RESULT ════════════ -->
<div class="screen hidden" id="s-res">

  <!-- 컬러 배너 (짧음 — 동물이 걸쳐 나옴) -->
  <div class="res-banner" id="res-banner">
    <div class="banner-spark" style="top:30px;left:18%">✦</div>
    <div class="banner-spark" style="top:55px;right:14%;animation-delay:.6s">✦</div>
    <div class="banner-spark" style="top:20px;right:32%;animation-delay:1.2s;font-size:11px">✦</div>
    <div class="banner-spark" style="top:70px;left:30%;animation-delay:.9s;font-size:12px">✦</div>
    <div class="grade-chip" id="res-grade">✨ 전설</div>
  </div>

  <!-- 동물 이미지 (배너 아래로 걸쳐 나옴) -->
  <div class="animal-wrapper">
    <div class="animal-ring" id="animal-ring">
      <div class="animal-circle" id="animal-circle">
        <!-- SVG inserted here by JS -->
      </div>
    </div>
  </div>

  <!-- 이름/등급 -->
  <div class="res-info">
    <div class="res-sub-tag">전생의 당신은</div>
    <div class="res-name" id="res-name">눈표범</div>
    <div class="res-rarity">
      <div class="rarity-dot" id="rarity-dot"></div>
      <span id="res-rarity">상위 3%</span>
    </div>
  </div>

  <!-- 정보 카드 3장 -->
  <div class="res-cards">
    <div class="info-card" id="ic1">
      <div class="card-label">⚡ 전생 스토리</div>
      <p class="card-text" id="res-story"></p>
    </div>
    <div class="info-card" id="ic2">
      <div class="card-label">🌟 현생의 당신</div>
      <div class="trait-list" id="res-traits"></div>
    </div>
    <div class="info-card" id="ic3">
      <div class="card-label">💛 나와 잘 맞는 전생 동물</div>
      <div class="compat-row">
        <div class="compat-img" id="compat-img"></div>
        <div>
          <div class="compat-name" id="compat-name"></div>
          <div class="compat-desc" id="compat-desc"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="res-btns">
    <button class="btn-primary" onclick="shareResult()">🐾 친구에게 전생동물 물어보기</button>
    <button class="btn-ghost" onclick="doReset()">↩ 다시 테스트하기</button>
  </div>
</div>

</div><!-- .app -->

<script>
/* ═══════════════════════════
   SVG ILLUSTRATIONS — 24종
═══════════════════════════ */

  E1:{name:'황제펭귄',grade:'💙 레어',rar:'상위 25%',rarColor:'#1E40AF',bg:'linear-gradient(135deg,#172554,#1E40AF)',ring:'#1E40AF',story:'영하 60도에서도 새끼를 품는 극한의 헌신을 보여준 부모. 행동으로만 말합니다.',traits:['한번 보살피기 시작하면 끝까지 책임짐','감정을 드러내지 않지만 행동으로 증명','팀워크 중시, 가장 든든한 버팀목'],cp:'레서판다',cpKey:'D0',cpDesc:'내 묵묵함을 가장 잘 이해하는 화려한 존재'},

  F1:{name:'쿼카',grade:'🌱 일반',rar:'상위 50%',rarColor:'#059669',bg:'linear-gradient(135deg,#064E3B,#059669)',ring:'#059669',story:'호주 로트네스트 섬에서 세상에서 가장 행복한 표정으로 살아온 낙관주의자.',traits:['어떤 상황에서도 긍정적인 면을 찾음','주변 사람을 기분 좋게 만드는 재주','걱정보다 즐김을 선택하는 삶의 방식'],cp:'코알라',cpKey:'A1',cpDesc:'내 행복에 조용히 함께 기뻐해주는 존재'},
  F2:{name:'미니돼지',grade:'🌱 일반',rar:'상위 50%',rarColor:'#DB2777',bg:'linear-gradient(135deg,#831843,#DB2777)',ring:'#DB2777',story:'개보다 지능이 높지만 귀엽다는 이유로 오해받아온 숨은 천재.',traits:['실제 능력치가 외모보다 훨씬 높음','감정을 잘 읽고 공감 능력이 뛰어남','사회적이고 함께하는 것을 즐김'],cp:'나무늘보',cpKey:'A2',cpDesc:'내 빠름을 느리게 해줘서 더 깊어지는 존재'},
  G0:{name:'알파카',grade:'🔥 희귀',rar:'상위 15%',rarColor:'#16A34A',bg:'linear-gradient(135deg,#14532D,#16A34A)',ring:'#16A34A',story:'안데스 고원에서 무리를 지키며 귀여운 외모로 모두를 무장해제시킨 전사.',traits:['귀여운 외모와 달리 내면은 강함','선을 넘으면 확실하게 표현함','무리를 중요시하고 누군가를 지키려 함'],cp:'흰수염고래',cpKey:'B0',cpDesc:'내 행동 이면의 깊은 마음을 읽어주는 존재'},
  G1:{name:'미어캣',grade:'🌱 일반',rar:'상위 50%',rarColor:'#B45309',bg:'linear-gradient(135deg,#451A03,#B45309)',ring:'#B45309',story:'사막 한가운데서 보초를 서며 무리를 지킨 커뮤니티의 수호자.',traits:['주변 상황 파악이 남다르게 빠름','책임감 강하고 맡은 역할에 충실','혼자보다 함께일 때 더 빛남'],cp:'해마',cpKey:'B1',cpDesc:'내 보초 옆에서 조용히 기다려주는 낭만가'},
  G2:{name:'긴코너구리',grade:'🌱 일반',rar:'상위 50%',rarColor:'#0284C7',bg:'linear-gradient(135deg,#0C2A4A,#0284C7)',ring:'#0284C7',story:'남미 열대우림을 탐험하며 코로 모든 것을 감지한 호기심 폭발 모험가.',traits:['새로운 것에 대한 호기심이 넘침','어디서든 잘 적응하는 유연함','활발하지만 내면은 섬세함'],cp:'판다',cpKey:'B2',cpDesc:'내 탐험 이야기를 제일 흥미롭게 들어주는 존재'},
  H0:{name:'플라밍고',grade:'🔥 희귀',rar:'상위 15%',rarColor:'#E11D48',bg:'linear-gradient(135deg,#9D1038,#E11D48)',ring:'#E11D48',story:'먹는 것에 따라 분홍빛으로 물드는 존재. 환경이 곧 나이고, 감수성이 피부에 드러납니다.',traits:['주변 영향을 많이 받는 예민한 감각','무리 속에서도 확실히 눈에 띔','감정 표현이 풍부하고 화려함'],cp:'아르마딜로',cpKey:'C1',cpDesc:'나의 화려함을 속에서 단단하게 받쳐주는 존재'},
  H1:{name:'카멜레온',grade:'💙 레어',rar:'상위 25%',rarColor:'#0D9488',bg:'linear-gradient(135deg,#064E3B,#0D9488)',ring:'#0D9488',story:'색을 바꾸는 건 위장이 아니라 감정 표현. 사실 세상에서 가장 솔직한 동물입니다.',traits:['상황에 따라 다른 모습을 자유자재로','감정이 얼굴에 다 드러남','어디서나 적응하는 사회적 능력'],cp:'라마',cpKey:'C2',cpDesc:'내 변화를 흔들리지 않고 지켜봐 주는 존재'},
  H2:{name:'수달',grade:'🌱 일반',rar:'상위 50%',rarColor:'#7C3AED',bg:'linear-gradient(135deg,#3B0764,#7C3AED)',ring:'#7C3AED',story:'강가에서 하루 종일 놀며 워라밸의 진리를 깨달은 현자.',traits:['놀 때 완전히 노는 경계 설정의 달인','유머 감각이 뛰어나고 주변을 즐겁게 함','감정 표현이 자연스럽고 솔직함'],cp:'코모도왕도마뱀',cpKey:'C0',cpDesc:'내 가벼움을 무겁게 만들지 않는 든든한 존재'},
};

/* ═══════════════════════════
   STATE
═══════════════════════════ */
let curQ=0, sc={s:0,e:0,x:0}, curScr='s-start', lastKey=null;

/* preview */
['A0','D0','H0','B0','F1'].forEach(k=>{
  const d=document.createElement('div');
  d.className='prev-bub';
  d.innerHTML=SVG[k];
  document.getElementById('preview-bubs').appendChild(d);
});

/* ═══════════════════════════
   NAVIGATION
═══════════════════════════ */
function goto(id){
  const c=document.getElementById(curScr), n=document.getElementById(id);
  c.classList.add('exit');
  setTimeout(()=>{c.classList.remove('exit');c.classList.add('hidden');},420);
  n.classList.remove('hidden');
  curScr=id;
}

/* ═══════════════════════════
   QUESTION
═══════════════════════════ */
function renderQ(i){
  const q=QS[i];
  document.getElementById('q-num').textContent=`질문 ${i+1} / 5`;
  document.getElementById('q-icon').textContent=q.ico;
  document.getElementById('q-text').textContent=q.txt;
  document.querySelectorAll('.ps').forEach((s,idx)=>{
    s.className='ps';
    if(idx<i)s.classList.add('done');
    if(idx===i)s.classList.add('cur');
  });
  const wrap=document.getElementById('opts');
  wrap.innerHTML='';
  q.opts.forEach((o,oi)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.style.animation=`optIn .34s cubic-bezier(.34,1.56,.64,1) ${oi*.09}s forwards`;
    b.innerHTML=`<span class="opt-icon">${o.ico}</span><span class="opt-text">${o.txt}</span>`;
    b.onclick=()=>pick(b,o);
    wrap.appendChild(b);
  });
}

/* keyframe inject */
if(!document.getElementById('_kf')){
  const s=document.createElement('style');s.id='_kf';
  s.textContent='@keyframes optIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(s);
}

function pick(btn,opt){
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  sc.s+=opt.s; sc.e+=opt.e; sc.x+=opt.x;
  setTimeout(()=>{ curQ++; curQ<5 ? renderQ(curQ) : showLoad(); }, 340);
}

/* ═══════════════════════════
   LOADING
═══════════════════════════ */
const LS=[
  {e:'🔮',t:'전생을 분석하는 중...',s:'우주의 기억을 탐색하고 있어요'},
  {e:'🌌',t:'전생 기록을 열람하는 중...',s:'당신의 전생 에너지를 감지했습니다'},
  {e:'🐾',t:'동물 형태를 특정하는 중...',s:'24종 중 당신의 동물을 찾았습니다!'},
];
function showLoad(){
  goto('s-load');
  let i=0;
  (function tick(){
    const d=LS[i];
    document.getElementById('load-icon').textContent=d.e;
    document.getElementById('load-title').textContent=d.t;
    document.getElementById('load-sub').textContent=d.s;
    if(++i<LS.length) setTimeout(tick,880);
    else setTimeout(showResult,880);
  })();
}

/* ═══════════════════════════
   RESULT — 완전히 재설계
═══════════════════════════ */
function calcKey(){
  const zm={
    '혼자+여유+감추는':'A','혼자+여유+드러내는':'B',
    '혼자+활동+감추는':'C','혼자+활동+드러내는':'D',
    '함께+여유+감추는':'E','함께+여유+드러내는':'F',
    '함께+활동+감추는':'G','함께+활동+드러내는':'H',
  };
  const zone=zm[`${sc.s>=0?'혼자':'함께'}+${sc.e>=0?'여유':'활동'}+${sc.x>=0?'감추는':'드러내는'}`];
  const mag=Math.abs(sc.s)+Math.abs(sc.e);
  return `${zone}${mag>=4?0:mag>=2?1:2}`;
}

function showResult(){
  const key=calcKey();
  const a=A[key];
  lastKey=key;
  goto('s-res');

  /* 배너 배경 */
  document.getElementById('res-banner').style.background=a.bg;

  /* 등급 칩 */
  document.getElementById('res-grade').textContent=a.grade;

  /* 동물 링 (색상 테두리) */
  const ring=document.getElementById('animal-ring');
  ring.style.background=`linear-gradient(135deg, ${a.ring}88, ${a.ring})`;
  ring.style.padding='5px';

  /* 동물 이미지 — 흰 배경에 SVG */
  const circle=document.getElementById('animal-circle');
  circle.innerHTML=SVG[key]; /* 직접 삽입, 항상 white 배경 */

  /* 이름/등급 */
  document.getElementById('res-name').textContent=a.name;
  document.getElementById('res-rarity').textContent=a.rar;
  document.getElementById('rarity-dot').style.background=a.rarColor;

  /* 카드 내용 */
  document.getElementById('res-story').textContent=a.story;
  document.getElementById('res-traits').innerHTML=
    a.traits.map(t=>`<div class="trait-item"><div class="trait-bullet"></div><span>${t}</span></div>`).join('');

  /* 궁합 동물 */
  document.getElementById('compat-img').innerHTML=SVG[a.cpKey];
  document.getElementById('compat-name').textContent=a.cp;
  document.getElementById('compat-desc').textContent=a.cpDesc;

  /* 스크롤 초기화 */
  document.getElementById('s-res').scrollTop=0;

  /* 카드 순차 등장 */
  ['ic1','ic2','ic3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.classList.remove('show');
    setTimeout(()=>el.classList.add('show'), 300+i*120);
  });
}

/* ═══════════════════════════
   ACTIONS
═══════════════════════════ */
function goQ(){goto('s-q');curQ=0;sc={s:0,e:0,x:0};renderQ(0);}

function doReset(){
  const res=document.getElementById('s-res');
  const start=document.getElementById('s-start');
  res.classList.add('exit');
  setTimeout(()=>{
    res.classList.remove('exit');res.classList.add('hidden');
    ['ic1','ic2','ic3'].forEach(id=>document.getElementById(id).classList.remove('show'));
  },420);
  start.classList.remove('hidden');
  curScr='s-start';curQ=0;sc={s:0,e:0,x:0};
}

function shareResult(){
  const a=A[lastKey||calcKey()];
  const txt=`나 전생에 ${a.name}이었대 ㅋㅋ ${a.rar}이래\n전생 동물 테스트 해봐 👇`;
  if(navigator.share)navigator.share({title:'나의 전생 동물은?',text:txt,url:location.href}).catch(()=>{});
  else navigator.clipboard.writeText(`${txt}\n${location.href}`).then(()=>toast('링크 복사 완료! 🐾')).catch(()=>toast('주소창에서 링크를 복사하세요'));
}

function shareApp(){
  const txt='나 전생 동물 테스트 해봤는데 신기함 ㅋㅋ 너도 해봐 👇';
  if(navigator.share)navigator.share({title:'나의 전생 동물은?',text:txt,url:location.href}).catch(()=>{});
  else navigator.clipboard.writeText(`${txt}\n${location.href}`).then(()=>toast('링크 복사! 👾'));
}

function toast(msg){
  let t=document.getElementById('_t');
  if(!t){t=document.createElement('div');t.id='_t';document.body.appendChild(t);}
  Object.assign(t.style,{
    position:'fixed',bottom:'68px',left:'50%',
    transform:'translateX(-50%) translateY(14px)',
    background:'#1A1D23',color:'#fff',
    padding:'12px 22px',borderRadius:'100px',
    fontSize:'14px',fontWeight:'600',zIndex:'9999',
    fontFamily:"'Noto Sans KR',sans-serif",
    transition:'all .26s ease',opacity:'0',
    whiteSpace:'nowrap',maxWidth:'90vw',pointerEvents:'none',
  });
  t.textContent=msg;
  requestAnimationFrame(()=>{
    t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
    setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2200);
  });
}
</script>
