<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OK캐쉬백 푸드팡</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:"Pretendard Variable",-apple-system,sans-serif;color:#1A1A2E;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
#app{width:100%;height:100dvh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;opacity:0;pointer-events:none;transition:opacity .25s}
.screen.active{opacity:1;pointer-events:all}
/* MAIN */
#screen-main{justify-content:space-between;padding:max(env(safe-area-inset-top,0px),40px) 0 max(env(safe-area-inset-bottom,0px),40px);background:#fff}
.plays-badge{background:#FFF5EC;border:1px solid #FFD4A8;border-radius:999px;padding:6px 18px;font-size:13px;font-weight:600;color:#F07820;display:inline-block}
.main-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:0 24px}
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
.hero-cell{aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.4);position:relative}
.main-logo-wrap{width:100%;display:flex;align-items:center;justify-content:center;padding:0 16px}
.main-logo-img{width:100%;max-width:380px;height:auto;object-fit:contain;animation:logoFloat 3s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.3));border-radius:18%;mix-blend-mode:normal}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-cell:nth-child(1){animation:hf 2.8s ease-in-out infinite 0.0s}
.hero-cell:nth-child(2){animation:hf 2.8s ease-in-out infinite .25s}
.hero-cell:nth-child(3){animation:hf 2.8s ease-in-out infinite .5s}
.hero-cell:nth-child(4){animation:hf 2.8s ease-in-out infinite .75s}
.hero-cell:nth-child(5){animation:hf 2.8s ease-in-out infinite .1s}
.hero-cell:nth-child(6){animation:hf 2.8s ease-in-out infinite .35s}
.hero-cell:nth-child(7){animation:hf 2.8s ease-in-out infinite .6s}
.hero-q{animation:hf 2.8s ease-in-out infinite .85s;display:flex;align-items:center;justify-content:center;font-size:28px;background:#FFF5EC;border:2px dashed #FFB870;border-radius:16px;aspect-ratio:1}
@keyframes hf{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.main-texts{text-align:center}
.main-title{font-size:42px;font-weight:800;letter-spacing:-1.5px;line-height:1;margin-bottom:10px;color:#1A1A2E}
.main-title span{color:#F07820}
.main-sub{font-size:15px;color:#888;line-height:1.6}
.main-bottom{width:100%;padding:16px 20px env(safe-area-inset-bottom,16px);display:flex;flex-direction:column;align-items:center;gap:10px}
.btn-s2{height:48px;width:100%;border-radius:14px;background:#fff;border:1.5px solid #F07820;color:#F07820;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform 150ms}
.btn-s2:active{transform:scale(.97)}
/* BUTTONS */
.btn-p{height:56px;width:100%;border-radius:16px;background:linear-gradient(135deg,#F07820,#D45E10);color:#fff;font-size:17px;font-weight:700;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(240,120,32,.45);transition:transform 150ms;font-family:inherit}
.btn-p:active{transform:scale(.97)}
.btn-s{height:44px;width:100%;border-radius:12px;background:#f5f5f5;border:1px solid #e0e0e0;color:#666;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-g{height:56px;width:100%;border-radius:16px;background:linear-gradient(135deg,#FF8A00,#FFB800);color:#1a1100;font-size:17px;font-weight:700;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(255,184,0,.4);transition:transform 150ms;font-family:inherit}
.btn-g:active{transform:scale(.97)}
.btn-v{height:56px;width:100%;border-radius:16px;background:linear-gradient(135deg,#6C3DE8,#9B6BF2);color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:transform 150ms}
.btn-v:active{transform:scale(.97)}
/* COUNTDOWN */
#cd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:90}
#cd-overlay.active{display:flex}
.cd-active .hud{visibility:hidden}
.cd-active .ad-zone{visibility:hidden}
.cd-modal{background:#fff;border-radius:24px;padding:32px 24px;width:calc(100% - 48px);max-width:360px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.cd-inner{display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:400px;padding:0 24px}
.cd-num{font-size:96px;font-weight:800;color:#F07820;text-shadow:0 4px 20px rgba(240,120,32,.3);animation:cdp 1s cubic-bezier(.34,1.56,.64,1);line-height:1}
@keyframes cdp{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.cd-tips{display:flex;flex-direction:column;gap:8px;width:100%}
.cd-tip{display:flex;align-items:center;gap:10px;background:#FFF5EC;border-radius:12px;padding:11px 14px;font-size:15px;color:#333;border:1px solid #FFD4A8}
.cd-tip i{font-size:18px;flex-shrink:0;font-style:normal}
/* PLAY */
#screen-play{justify-content:flex-start;padding:0}
.hud{width:100%;padding:calc(env(safe-area-inset-top,0px) + 16px) 12px 4px;flex-shrink:0}
.hud-card{background:rgba(255,255,255,0.85);border-radius:16px;padding:10px 14px 12px;margin-bottom:4px;backdrop-filter:blur(8px);box-shadow:0 2px 16px rgba(0,0,0,0.12)}
.hud-bar-bg{height:7px;background:rgba(255,255,255,.2);border-radius:999px;overflow:hidden;margin-bottom:8px}
.hud-bar{height:100%;border-radius:999px;width:100%;background:#F07820;transition:width .9s linear,background .4s}
.hud-bar.w{background:#FFB800}.hud-bar.d{background:#FF5500}
.hud-bar.c{background:#FF6600;animation:blink .35s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hud-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px}
.hud-time{font-size:36px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1;transition:color .3s;color:#F07820}
.hud-time.w{color:#E8960A}.hud-time.d{color:#D45E10}
.hud-time.c{color:#D45E10;animation:tpulse .35s ease-in-out infinite}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hud-right{text-align:right}
.hud-slbl{font-size:11px;color:#aaa}
.hud-score{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;color:#F07820}
.hud-combo{font-size:12px;font-weight:700;color:#FFB800;min-height:14px;text-align:right}
.hud-msg-row{height:auto;display:flex;align-items:center;justify-content:center;padding-top:8px;margin-top:6px;border-top:1px solid rgba(0,0,0,0.06)}
.hud-msg{font-size:18px;font-weight:700;text-align:center;letter-spacing:-0.3px;color:#F07820}
/* BOARD */
.board-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:4px 8px;min-height:0;position:relative;overflow:hidden}

#board-canvas{display:block;touch-action:none}
/* GHOST */
#drag-ghost{position:fixed;pointer-events:none;z-index:200;display:none;border-radius:14px;overflow:hidden;transform:translate(-50%,-50%) scale(1.15);box-shadow:0 12px 32px rgba(0,0,0,.6);will-change:left,top;-webkit-transform:translate(-50%,-50%) scale(1.15)}
#drag-ghost canvas{display:block}
/* AD */
.ad-zone{width:100%;height:100px;flex-shrink:0;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;padding-bottom:env(safe-area-inset-bottom,0)}
.ad-inner{width:calc(100% - 32px);height:68px;background:rgba(255,255,255,.05);border-radius:10px;border:1px dashed rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center}
.ad-lbl{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px}
/* POPUPS */
.spop{position:fixed;font-size:16px;font-weight:800;pointer-events:none;z-index:50;text-shadow:0 2px 6px rgba(0,0,0,.9);animation:sfly .9s ease-out forwards;white-space:nowrap}
@keyframes sfly{0%{transform:translateY(0) scale(.8);opacity:1}100%{transform:translateY(-52px) scale(1.1);opacity:0}}
.tpop{position:fixed;left:50%;top:30%;transform:translateX(-50%);font-size:26px;font-weight:800;pointer-events:none;z-index:9999;text-shadow:0 3px 12px rgba(0,0,0,.95);white-space:nowrap;animation:tfly 1.1s ease-out forwards;letter-spacing:-0.5px}
@keyframes tfly{0%{transform:translateX(-50%) translateY(0) scale(.7);opacity:1}50%{transform:translateX(-50%) translateY(-20px) scale(1.2);opacity:1}100%{transform:translateX(-50%) translateY(-46px) scale(1);opacity:0}}
#danger-ring{position:fixed;inset:0;pointer-events:none;z-index:99;border:5px solid #FF6600;opacity:0}
#danger-ring.on{animation:rp .45s ease-in-out infinite}
@keyframes rp{0%,100%{opacity:0}50%{opacity:.8}}
/* RESULT */
#screen-result{justify-content:space-between;padding:max(env(safe-area-inset-top,0px),40px) 24px max(env(safe-area-inset-bottom,0px),40px);background:#fff}
.res-head{text-align:center}
.res-head h2{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;color:#1A1A2E}
.res-head p{font-size:14px;color:#888}
.res-mid{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;flex:1;justify-content:center}
.score-divider{width:100%;height:1px;background:rgba(255,255,255,.3);margin:20px 0}
.score-card-orange{background:linear-gradient(135deg,#F07820,#FFB347);border-radius:14px;padding:16px;margin-top:16px}
.score-card-orange .score-stat-l{color:rgba(255,255,255,0.75)}
.score-card-orange .score-stat-v{color:#fff}
.score-card-orange .score-stat-sub{color:rgba(255,255,255,0.75)}
.score-card-orange .score-stat-sep{background:rgba(255,255,255,0.3)}
.score-stats{display:flex;align-items:center;gap:0;width:100%}
.score-stat-item{flex:1;text-align:center}
.score-stat-l{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:6px}
.score-stat-v{font-size:26px;font-weight:800;color:#fff;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,.15)}
.score-stat-sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px}
.score-stat-sep{width:1px;height:60px;background:rgba(255,255,255,.3);align-self:center}
.btn-link{display:block;text-align:center;padding:14px;font-size:14px;color:#bbb;cursor:pointer;text-decoration:none;font-family:inherit}
/* 결과 카드 - 심플하게 */
.score-card{width:100%;background:linear-gradient(150deg,#F07820,#FFB347);border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 6px 24px rgba(240,120,32,.35)}
.score-card-label{font-size:13px;color:rgba(255,255,255,.8);font-weight:500;margin-bottom:8px}
.score-card-value{font-size:60px;font-weight:800;letter-spacing:-2px;color:#fff;font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.score-card-unit{font-size:18px;font-weight:600;color:rgba(255,255,255,.7);margin-top:2px}
.stat-row{display:flex;gap:10px;width:100%}
.stat-card{flex:1;background:#f8f8f8;border:1px solid #eee;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-v{font-size:20px;font-weight:800;color:#1A1A2E}.stat-l{font-size:11px;color:#999;margin-top:2px}
.res-btns{display:flex;flex-direction:column;gap:8px;width:100%}
/* EMPTY */
#screen-empty{justify-content:center;gap:18px;padding:32px 24px;background:#fff}
.em-icon{font-size:60px}.em-title{font-size:22px;font-weight:800;text-align:center;line-height:1.3;color:#1A1A2E}
.em-sub{font-size:14px;color:#888;text-align:center;line-height:1.6}
.em-best{background:#FFF5EC;border:1px solid #FFD4A8;border-radius:12px;padding:12px 24px;text-align:center}
.em-best-l{font-size:12px;color:#999}.em-best-v{font-size:28px;font-weight:800;color:#F07820}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes boardPop{0%{opacity:0;transform:scale(0.6)}40%{opacity:1;transform:scale(1.12)}70%{transform:scale(0.95)}100%{opacity:0;transform:scale(1.05)}}
@keyframes spin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
#no-moves-overlay{animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ani{animation:su .3s cubic-bezier(.34,1.56,.64,1) both}
</style>
</head>

// SVG → Image 프리로드
var imgEls=IMGS.map(function(src,i){
  var el=new Image(); el.src=src; return el;

// ── 타일별 애니메이션 상태 (깜빡임 제거 핵심) ──
// tileAnims[r][c] = {dy:float, alpha:float, scale:float}
// 나머지 타일은 항상 정적으로 유지
var tileAnims=[];
function initAnims(){
  tileAnims=[];
  for(var r=0;r<C.B;r++){tileAnims[r]=[];for(var c=0;c<C.B;c++)tileAnims[r][c]={dy:0,alpha:1,scale:1};}
}

// ── CANVAS HELPERS ──
function rrect(cx,x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();
}

// ── 타일 1개 그리기: 배경색 → 광택 → SVG아이콘 → 글로우 ──
function drawTile(cx,t,sp,x,y,sz,alpha,sc){
  if(t<0) return;
  alpha=alpha===undefined?1:alpha;
  sc=sc||1;
  cx.save();
  cx.globalAlpha=alpha;
  var cx2=x+sz/2, cy2=y+sz/2;
  cx.translate(cx2,cy2);
  cx.scale(sc,sc);
  var hw=sz/2, r=sz*0.18;

  // 배경 없음 - 이미지 그대로 렌더링
  // fallback: 이미지 로드 전 연한 회색만
  if(!imgEls[t]||!imgEls[t].complete||!imgEls[t].naturalWidth){
    cx.fillStyle='rgba(200,200,200,0.3)';
    rrect(cx,-hw,-hw,sz,sz,r); cx.fill();
  }

  // ③ SVG 아이콘 (배경 위)
  var img=imgEls[t];
  if(img&&img.complete&&img.naturalWidth>0){
    // 스프라이트 자체 배경이 있으므로 패딩 없이 꽉 채움
    cx.drawImage(img,-hw,-hw,sz,sz);
  } else {
    // fallback: BG색만
  }

  // ④ 스페셜 블록 시각화
  if(sp==='smile'){
    var gol=cx.createRadialGradient(0,0,sz*0.1,0,0,sz*0.6);
    gol.addColorStop(0,'rgba(255,220,0,0.38)');
    gol.addColorStop(1,'rgba(255,160,0,0.0)');
    cx.fillStyle=gol; rrect(cx,-hw,-hw,sz,sz,r); cx.fill();
    cx.shadowColor='#FFD700'; cx.shadowBlur=20;
    cx.strokeStyle='#FFE44D'; cx.lineWidth=4;
    rrect(cx,-hw+2,-hw+2,sz-4,sz-4,r); cx.stroke();
    cx.shadowBlur=0;
    cx.font='bold '+(sz*0.3)+'px sans-serif';
    cx.textAlign='right'; cx.textBaseline='top';
    cx.shadowColor='rgba(0,0,0,0.8)'; cx.shadowBlur=3;
    cx.fillStyle='#fff'; cx.fillText('⭐',hw-1,-hw+2);
    cx.shadowBlur=0;
  } else if(sp==='food'){
    var red=cx.createRadialGradient(0,0,sz*0.1,0,0,sz*0.6);
    red.addColorStop(0,'rgba(255,30,80,0.42)');
    red.addColorStop(1,'rgba(255,0,50,0.0)');
    cx.fillStyle=red; rrect(cx,-hw,-hw,sz,sz,r); cx.fill();
    cx.shadowColor='#D45E10'; cx.shadowBlur=24;
    cx.strokeStyle='#FF4477'; cx.lineWidth=4.5;
    rrect(cx,-hw+2,-hw+2,sz-4,sz-4,r); cx.stroke();
    cx.shadowBlur=0;
    cx.font='bold '+(sz*0.3)+'px sans-serif';
    cx.textAlign='right'; cx.textBaseline='top';
    cx.shadowColor='rgba(0,0,0,0.8)'; cx.shadowBlur=3;
    cx.fillStyle='#fff'; cx.fillText('🔴',hw-1,-hw+2);
    cx.shadowBlur=0;
  }
  cx.restore();
}

// ── 전체 보드 렌더 (tileAnims 적용) ──
// matched = Set of "r_c" 문자열 (제거 중인 타일, 건너뜀)
function renderFull(skipSet){
  if(!CTX) return;
  // 점수 항상 동기화
  var sc=document.getElementById('hud-score');
  if(sc) sc.textContent=score.toLocaleString();
  CTX.clearRect(0,0,BPX,BPX);
  CTX.fillStyle='#FCB17B';
  rrect(CTX,0,0,BPX,BPX,16); CTX.fill();

  for(var r=0;r<C.B;r++){
    for(var c=0;c<C.B;c++){
      var cell=board[r][c];
      if(!cell||cell.t<0) continue;
      var key=r+'_'+c;
      if(skipSet&&skipSet[key]) continue; // 제거 애니메이션은 별도 처리

      var bx=GAP+c*(CELL+GAP);
      var by=GAP+r*(CELL+GAP);
      var an=tileAnims[r]&&tileAnims[r][c]?tileAnims[r][c]:{dy:0,alpha:1,scale:1};

      // 드래그 중 원본은 반투명
      var al=(drag.on&&drag.r===r&&drag.c===c)?0.2:an.alpha;
      drawTile(CTX,cell.t,cell.sp,bx,by+an.dy,CELL,al,an.scale);
    }
  }

  // 선택 하이라이트
  if(drag.selR>=0&&!drag.on){
    var bx2=GAP+drag.selC*(CELL+GAP), by2=GAP+drag.selR*(CELL+GAP);
    CTX.strokeStyle='rgba(255,255,255,0.9)';CTX.lineWidth=3;
    rrect(CTX,bx2+1.5,by2+1.5,CELL-3,CELL-3,CELL*0.16);CTX.stroke();
  }
  // 드래그 대상 하이라이트
  if(drag.on){
    var nr2=drag.r,nc2=drag.c;
    if(Math.abs(drag.dx)>Math.abs(drag.dy)) nc2+=(drag.dx>0?1:-1);
    else nr2+=(drag.dy>0?1:-1);
    if(nr2>=0&&nr2<C.B&&nc2>=0&&nc2<C.B&&(nr2!==drag.r||nc2!==drag.c)){
      var hx=GAP+nc2*(CELL+GAP),hy=GAP+nr2*(CELL+GAP);
      CTX.strokeStyle='rgba(255,255,255,0.5)';CTX.lineWidth=2;
      rrect(CTX,hx+1,hy+1,CELL-2,CELL-2,CELL*0.16);CTX.stroke();
    }
  }
}

// ── GHOST ──
var ghostCV=null,ghostCTX=null;
function initGhost(){
  ghostCV=document.getElementById('ghost-cv');
  ghostCV.width=CELL;ghostCV.height=CELL;
  ghostCV.style.width=CELL+'px';ghostCV.style.height=CELL+'px';
  ghostCTX=ghostCV.getContext('2d');
}
function showGhost(t,sp,x,y){
  var g=document.getElementById('drag-ghost');
  g.style.width=CELL+'px';g.style.height=CELL+'px';g.style.display='block';
  ghostCTX.clearRect(0,0,CELL,CELL);
  drawTile(ghostCTX,t,sp,0,0,CELL,1,1);
  g.style.left=x+'px';g.style.top=y+'px';
}
function moveGhost(x,y){document.getElementById('drag-ghost').style.left=x+'px';document.getElementById('drag-ghost').style.top=y+'px';}
function hideGhost(){document.getElementById('drag-ghost').style.display='none';}

// ── POINTER ──
function cellAt(px,py){
  var rect=CV.getBoundingClientRect();
  var x=px-rect.left,y=py-rect.top;
  var c=Math.floor(x/(CELL+GAP)),r=Math.floor(y/(CELL+GAP));
  if(r<0||r>=C.B||c<0||c>=C.B) return null;
  var lx=x-GAP-c*(CELL+GAP),ly=y-GAP-r*(CELL+GAP);
  if(lx<0||lx>=CELL||ly<0||ly>=CELL) return null;
  return {r:r,c:c};
}
// evXY removed - using Pointer Events directly

// ── Pointer Events 단일화 (터치/마우스 통합, canvas 밖 드래그 지원) ──
function onDown(e){
  if(busy) return;
  e.preventDefault();
  initAudio(); clearHintTimer(); resetIdleWarn();
  var px=e.clientX, py=e.clientY;
  var pos=cellAt(px,py);
  if(!pos||board[pos.r][pos.c].t<0) return;
  // setPointerCapture: 손가락이 canvas 밖으로 나가도 이벤트 계속 수신
  try{ CV.setPointerCapture(e.pointerId); }catch(ex){}
  drag.on=false;
  drag.r=pos.r; drag.c=pos.c;
  drag.ox=px; drag.oy=py;
  drag.dx=0; drag.dy=0;
  drag.selR=pos.r; drag.selC=pos.c;
  renderFull(null);
}
function onMove(e){
  if(drag.r<0) return;
  e.preventDefault();
  var px=e.clientX, py=e.clientY;
  drag.dx=px-drag.ox; drag.dy=py-drag.oy;
  var dist=Math.sqrt(drag.dx*drag.dx+drag.dy*drag.dy);
  if(!drag.on && dist>8){
    drag.on=true;
    showGhost(board[drag.r][drag.c].t, board[drag.r][drag.c].sp, px, py);
  }
  if(drag.on){ moveGhost(px,py); renderFull(null); }
}
function onUp(e){
  if(drag.r<0) return;
  e.preventDefault();
  try{ CV.releasePointerCapture(e.pointerId); }catch(ex){}
  if(drag.on){
    hideGhost(); drag.on=false;
    var nr=drag.r, nc=drag.c;
    if(Math.abs(drag.dx)>Math.abs(drag.dy)) nc+=(drag.dx>0?1:-1);
    else nr+=(drag.dy>0?1:-1);
    var r1=drag.r, c1=drag.c;
    drag.r=-1; drag.selR=-1; drag.selC=-1;
    if(nr>=0&&nr<C.B&&nc>=0&&nc<C.B&&(nr!==r1||nc!==c1)) doSwap(r1,c1,nr,nc);
    else renderFull(null);
  } else {
    var px=e.clientX, py=e.clientY;
    var pos=cellAt(px,py);
    if(pos&&board[pos.r][pos.c].t>=0){
      if(drag.selR>=0&&(drag.selR!==pos.r||drag.selC!==pos.c)){
        var dr=Math.abs(pos.r-drag.selR),dc=Math.abs(pos.c-drag.selC);
        if(dr+dc===1){
          var sr=drag.selR,sc=drag.selC;
          drag.r=-1;drag.selR=-1;drag.selC=-1;
          doSwap(sr,sc,pos.r,pos.c);
        } else {
          drag.selR=pos.r;drag.selC=pos.c;drag.r=pos.r;drag.c=pos.c;renderFull(null);
        }
      } else {
        var same=(drag.selR===pos.r&&drag.selC===pos.c);
        drag.selR=same?-1:pos.r; drag.selC=same?-1:pos.c;
        drag.r=drag.selR; drag.c=drag.selC; renderFull(null);
      }
    } else { drag.r=-1;drag.selR=-1;drag.selC=-1;renderFull(null); }
  }
}

function fireSpecial(mode, r1,c1,r2,c2, sp1,sp2, swapT1,swapT2, extraMatched){
  var B=C.B;
  var toRemove={}; // 효과 타일 (스페셜 타일 포함 전체)
  var matchedSet={}; // 매치된 일반 타일 (스왑으로 매치된 것들 - 이미 board에서 제거됨)

  function addCross(r,c){
    for(var cc=0;cc<B;cc++) toRemove[r+'_'+cc]=1;
    for(var rr=0;rr<B;rr++) toRemove[rr+'_'+c]=1;
  }
  function addSameType(tgt){
    for(var rr=0;rr<B;rr++) for(var cc=0;cc<B;cc++)
      if(board[rr][cc].t===tgt) toRemove[rr+'_'+cc]=1;
  }

  // 스페셜 타일 자체도 toRemove에 포함
  toRemove[r1+'_'+c1]=1;
  if(mode==='both') toRemove[r2+'_'+c2]=1;
  // 함께 매치된 일반 타일도 toRemove에 포함 (같이 강조, 같이 사라짐)
  if(extraMatched){
    extraMatched.forEach(function(m){ toRemove[m.r+'_'+m.c]=1; });
  }

  var popMsg='', popCol='#FFD700';

  if(mode==='single'){
    var sp=board[r1][c1].sp;
    if(sp==='smile'){
      addCross(r1,c1);
      popMsg='⭐ 스마일팡!'; popCol='#FFD700';
      timeLeft=Math.min(C.MAX,timeLeft+C.T4);
      showTP('⭐ SMILE PANG! +'+C.T4+'초','#FFD700');
      sfxSmile();
    } else if(sp==='food'){
      var tgt=swapT1>=0?swapT1:board[r1][c1].t;
      addSameType(tgt);
      popMsg='🔴 푸드팡!!'; popCol='#FF6600';
      timeLeft=Math.min(C.MAX,timeLeft+C.T5);
      showTP('🔴 FOOD PANG!! +'+C.T5+'초','#D45E10');
      sfxFood();
    }
  } else {
    // both
    if(sp1==='smile') addCross(r1,c1);
    else if(sp1==='food'){ var t1=swapT1>=0?swapT1:board[r1][c1].t; addSameType(t1); }
    if(sp2==='smile') addCross(r2,c2);
    else if(sp2==='food'){ var t2=swapT2>=0?swapT2:board[r2][c2].t; addSameType(t2); }
    popMsg='✨ 퍼펙트!!'; popCol='#F9D45B';
    timeLeft=Math.min(C.MAX,timeLeft+8);
    showTP('✨ PERFECT!! +8초 🎉','#D45E10');
    sfxFood();
  }
  sfxT(); updTimerUI();

  // 팝업 메시지 (타일 영역 중앙)
  showBoardPopup(popMsg, popCol);
  showBurst(mode==='both'?'perfect':(board[r1][c1].sp==='smile'?'smile':'food'), r1,c1);

  // ── 연출 흐름 ──
  // Phase 1 (0.6초): 효과 범위 타일 전체 강조 펄스 (스페셜 타일 포함)
  // Phase 2 (0.8초 정지): 다같이 멈춰있음 - 유저가 범위 인지
  // Phase 3 (0.3초): 전체 동시 페이드아웃
  // Phase 4: 낙하

  animSpecialHighlight(toRemove, function(){
    // 정지 구간
    setTimeout(function(){
      animSpecialFadeOut(toRemove, function(){
        // board 실제 제거
        // ── 연쇄 스페셜 감지 (제거 전에 toRemove 범위 내 스페셜 체크) ──
        var chainSpecials=[];
        for(var ckey in toRemove){
          var cpts=ckey.split('_');
          var crr=parseInt(cpts[0]),ccc=parseInt(cpts[1]);
          var ccel=board[crr][ccc];
          // 원래 발동한 스페셜은 제외
          var isOrigin=(crr===r1&&ccc===c1)||(mode==='both'&&crr===r2&&ccc===c2);
          if(!isOrigin&&ccel&&(ccel.sp==='smile'||ccel.sp==='food')){
            chainSpecials.push({r:crr,c:ccc,sp:ccel.sp,t:ccel.t});
          }
        }

        // toRemove 전체 제거
        for(var key in toRemove){
          var parts=key.split('_');
          var rr=parseInt(parts[0]),cc=parseInt(parts[1]);
          if(board[rr][cc].t>=0){ mcnt[board[rr][cc].t]++; board[rr][cc]={t:-1,sp:null}; }
        }

        if(chainSpecials.length>0){
          // 연쇄 보너스: +2초/개
          var bonus=chainSpecials.length*2;
          timeLeft=Math.min(C.MAX,timeLeft+bonus);
          updTimerUI();
          showTP('🔥 연쇄 스페셜! +'+bonus+'초','#F9D45B');
          showBoardPopup('🔥 연쇄 발동!!','#F9D45B');
          showBurst('perfect',r1,c1);
          sfxFan();
          // 연쇄 스페셜 추가 효과
          var B_ch=C.B;
          chainSpecials.forEach(function(cs){
            if(cs.sp==='smile'){
              for(var cx=0;cx<B_ch;cx++){if(board[cs.r][cx]&&board[cs.r][cx].t>=0){mcnt[board[cs.r][cx].t]++;board[cs.r][cx]={t:-1,sp:null};}}
              for(var cy=0;cy<B_ch;cy++){if(board[cy][cs.c]&&board[cy][cs.c].t>=0){mcnt[board[cy][cs.c].t]++;board[cy][cs.c]={t:-1,sp:null};}}
            } else if(cs.sp==='food'){
              for(var fx=0;fx<B_ch;fx++) for(var fy=0;fy<B_ch;fy++)
                if(board[fx][fy]&&board[fx][fy].t===cs.t){mcnt[cs.t]++;board[fx][fy]={t:-1,sp:null};}
            }
          });
          renderFull(null);
          setTimeout(function(){doDropAnim(function(){processChain();});},400);
        } else {
          renderFull(null);
          doDropAnim(function(){processChain();});
        }
      });
    }, 700);
  });
}

// Phase 1: 효과 범위 강조 펄스 (스페셜 타일과 동일한 강조)
function animSpecialHighlight(toRemove, cb){
  var DUR=600, start=null;
  requestAnimationFrame(function anim(ts){
    if(!start) start=ts;
    var p=Math.min(1,(ts-start)/DUR);
    renderFull(null);
    var pulse=Math.sin(p*Math.PI*6)*0.5+0.5; // 빠른 깜빡임
    var sc=1+pulse*0.1;
    for(var key in toRemove){
      var parts=key.split('_');
      var rr=parseInt(parts[0]),cc=parseInt(parts[1]);
      var cell=board[rr][cc];
      if(!cell||cell.t<0) continue;
      var bx=GAP+cc*(CELL+GAP), by=GAP+rr*(CELL+GAP);
      CTX.save();
      CTX.translate(bx+CELL/2, by+CELL/2);
      CTX.scale(sc,sc);
      // 타일 그리기
      drawTile(CTX,cell.t,cell.sp,-CELL/2,-CELL/2,CELL,1,1);
      // 황금/오렌지 글로우 오버레이
      CTX.globalAlpha=pulse*0.55;
      CTX.fillStyle='#FFD700';
      rrect(CTX,-CELL/2,-CELL/2,CELL,CELL,CELL*0.18);
      CTX.fill();
      // 테두리 강조
      CTX.globalAlpha=0.9;
      CTX.strokeStyle='#fff';
      CTX.lineWidth=2.5;
      rrect(CTX,-CELL/2,-CELL/2,CELL,CELL,CELL*0.18);
      CTX.stroke();
      CTX.restore();
    }
    if(p<1){ requestAnimationFrame(anim); }
    else{ cb(); }
  });
}

// Phase 3: 전체 동시 페이드아웃
function animSpecialFadeOut(toRemove, cb){
  // 정지 상태 스냅샷: toRemove 셀들이 강조된 채로
  var DUR=280, start=null;
  requestAnimationFrame(function anim(ts){
    if(!start) start=ts;
    var p=Math.min(1,(ts-start)/DUR);
    var al=1-p;
    var sc=1+p*0.2;
    renderFull(toRemove); // skip toRemove 셀 (배경으로 지움)
    // toRemove 셀 스케일업+페이드
    for(var key in toRemove){
      var parts=key.split('_');
      var rr=parseInt(parts[0]),cc=parseInt(parts[1]);
      var cell=board[rr][cc];
      if(!cell||cell.t<0) continue;
      var bx=GAP+cc*(CELL+GAP), by=GAP+rr*(CELL+GAP);
      CTX.save();
      CTX.translate(bx+CELL/2, by+CELL/2);
      CTX.scale(sc,sc);
      CTX.globalAlpha=al;
      drawTile(CTX,cell.t,cell.sp,-CELL/2,-CELL/2,CELL,1,1);
      CTX.globalAlpha=al*0.6;
      CTX.fillStyle='#FFE04D';
      rrect(CTX,-CELL/2,-CELL/2,CELL,CELL,CELL*0.18); CTX.fill();
      CTX.restore();
    }
    if(p<1){ requestAnimationFrame(anim); }
    else{ cb(); }
  });
}


function doSwap(r1,c1,r2,c2){
  if(busy) return;
  var b1=board[r1][c1], b2=board[r2][c2];
  if(b1.t<0||b2.t<0) return;
  busy=true;
  var p1x=GAP+c1*(CELL+GAP), p1y=GAP+r1*(CELL+GAP);
  var p2x=GAP+c2*(CELL+GAP), p2y=GAP+r2*(CELL+GAP);
  var DUR=130, start=null;
  var skip={};skip[r1+'_'+c1]=1;skip[r2+'_'+c2]=1;

  requestAnimationFrame(function anim(ts){
    if(!start) start=ts;
    var p=Math.min(1,(ts-start)/DUR);
    var ep=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    renderFull(skip);
    drawTile(CTX,b1.t,b1.sp,p1x+(p2x-p1x)*ep,p1y+(p2y-p1y)*ep,CELL,1,1);
    drawTile(CTX,b2.t,b2.sp,p2x+(p1x-p2x)*ep,p2y+(p1y-p2y)*ep,CELL,1,1);
    if(p<1){requestAnimationFrame(anim);return;}

    // 스왑 완료 → board 반영 (sp 보존)
    board[r1][c1]={t:b2.t, sp:b2.sp||null};
    board[r2][c2]={t:b1.t, sp:b1.sp||null};

    // 케이스 1: 스페셜+스페셜 직접 스왑
    if(b1.sp&&b2.sp){
      fireSpecial('both', r1,c1,r2,c2, b1.sp, b2.sp, b2.t, b1.t);
      return;
    }

    // 일반 매치 체크
    var matched=findM();

    // 케이스 2: 스페셜 타일이 매치 라인에 포함됨
    if(matched.length){
      var spInMatch=null;
      for(var i=0;i<matched.length;i++){
        var mc=board[matched[i].r][matched[i].c];
        if(mc.sp==='smile'||mc.sp==='food'){
          spInMatch=matched[i]; break;
        }
      }
      if(spInMatch){
        // 매치에 포함된 스페셜 발동 - 일반 타일 제거 없이 함께 전달
        var swapT=-1;
        for(var j=0;j<matched.length;j++){
          if(matched[j].r!==spInMatch.r||matched[j].c!==spInMatch.c){
            swapT=board[matched[j].r][matched[j].c].t; break;
          }
        }
        fireSpecial('single', spInMatch.r, spInMatch.c, -1,-1,
          board[spInMatch.r][spInMatch.c].sp, null, swapT, -1, matched);
        return;
      }
      // 일반 매치 (스페셜 없음)
      processChain();
      return;
    }

    // 매치 없음 → 되돌리기 (스페셜도 발동 안함)
    board[r1][c1]={t:b1.t,sp:b1.sp};board[r2][c2]={t:b2.t,sp:b2.sp};
    animReverse(r1,c1,r2,c2,p1x,p1y,p2x,p2y,b1,b2);
  });
}


function animReverse(r1,c1,r2,c2,p1x,p1y,p2x,p2y,b1,b2){
  var DUR=100,start=null;
  var skip={};skip[r1+'_'+c1]=1;skip[r2+'_'+c2]=1;
  requestAnimationFrame(function anim(ts){
    if(!start)start=ts;
    var p=Math.min(1,(ts-start)/DUR),ep=1-Math.pow(1-p,2);
    renderFull(skip);
    drawTile(CTX,b1.t,b1.sp, p2x+(p1x-p2x)*ep, p2y+(p1y-p2y)*ep, CELL,1,1);
    drawTile(CTX,b2.t,b2.sp, p1x+(p2x-p1x)*ep, p1y+(p2y-p1y)*ep, CELL,1,1);
    if(p<1){requestAnimationFrame(anim);}else{busy=false;renderFull(null);}
  });
}

// ── MATCH → REMOVE → DROP (깜빡임 없음) ──
// 핵심: 배경 clearRect 없이 해당 타일 위치만 덮어씀

// ── 가능한 이동 있는지 체크 ──
function hasMoves(){
  var B=C.B;
  for(var r=0;r<B;r++){
    for(var c=0;c<C.B;c++){
      // 오른쪽 스왑
      if(c+1<B){
        swap2(r,c,r,c+1);
        var m=findM().length>0;
        swap2(r,c,r,c+1);
        if(m)return true;
      }
      // 아래 스왑
      if(r+1<B){
        swap2(r,c,r+1,c);
        var m2=findM().length>0;
        swap2(r,c,r+1,c);
        if(m2)return true;
      }
    }
  }
  return false;
}
function swap2(r1,c1,r2,c2){
  var tmp=board[r1][c1].t;
  board[r1][c1].t=board[r2][c2].t;
  board[r2][c2].t=tmp;
}

// ── 매치 없을 때 셔플 ──
var noMovesShowing=false;
function showNoMoves(){
  if(noMovesShowing)return;
  noMovesShowing=true;
  clearHintTimer();

  // 메시지 토스트
  var toast=document.createElement('div');
  toast.style.cssText='position:fixed;left:50%;top:30%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:24px;font-size:16px;font-weight:700;z-index:200;white-space:nowrap;animation:fadeIn .3s ease';
  toast.textContent='🔀 카드를 섞어요!';
  document.body.appendChild(toast);

  // 1) 전체 타일 흩어지는 애니메이션 (0.5초)
  var B=C.B;
  var DUR1=500, start1=null;
  requestAnimationFrame(function scatterAnim(ts){
    if(!start1) start1=ts;
    var p=Math.min(1,(ts-start1)/DUR1);
    var ep=p*p;
    CTX.clearRect(0,0,BPX,BPX);
    CTX.fillStyle='#FCB17B'; rrect(CTX,0,0,BPX,BPX,16); CTX.fill();
    for(var r=0;r<B;r++) for(var cc=0;cc<B;cc++){
      var cell=board[r][cc]; if(!cell||cell.t<0) continue;
      var bx=GAP+cc*(CELL+GAP), by=GAP+r*(CELL+GAP);
      // 중심에서 밖으로 흩어짐
      var cx2=BPX/2-bx-CELL/2, cy2=BPX/2-by-CELL/2;
      var ox=-cx2*ep*0.4, oy=-cy2*ep*0.4;
      var sc=1-ep*0.3, al=1-ep*0.6;
      CTX.save(); CTX.translate(bx+CELL/2+ox, by+CELL/2+oy); CTX.scale(sc,sc);
      drawTile(CTX,cell.t,cell.sp,-CELL/2,-CELL/2,CELL,al,1);
      CTX.restore();
    }
    if(p<1){ requestAnimationFrame(scatterAnim); return; }

    // 2) 셔플 후 타일 모여드는 애니메이션
    shuffleBoard();
    var DUR2=500, start2=null;
    requestAnimationFrame(function gatherAnim(ts2){
      if(!start2) start2=ts2;
      var p2=Math.min(1,(ts2-start2)/DUR2);
      var ep2=1-Math.pow(1-p2,3);
      CTX.clearRect(0,0,BPX,BPX);
      CTX.fillStyle='#FCB17B'; rrect(CTX,0,0,BPX,BPX,16); CTX.fill();
      for(var r2=0;r2<B;r2++) for(var cc2=0;cc2<B;cc2++){
        var cell2=board[r2][cc2]; if(!cell2||cell2.t<0) continue;
        var bx2=GAP+cc2*(CELL+GAP), by2=GAP+r2*(CELL+GAP);
        var cx3=BPX/2-bx2-CELL/2, cy3=BPX/2-by2-CELL/2;
        var ox2=-cx3*(1-ep2)*0.4, oy2=-cy3*(1-ep2)*0.4;
        var sc2=0.7+ep2*0.3, al2=0.4+ep2*0.6;
        CTX.save(); CTX.translate(bx2+CELL/2+ox2, by2+CELL/2+oy2); CTX.scale(sc2,sc2);
        drawTile(CTX,cell2.t,cell2.sp,-CELL/2,-CELL/2,CELL,al2,1);
        CTX.restore();
      }
      if(p2<1){ requestAnimationFrame(gatherAnim); return; }
      // 완료
      if(toast.parentNode) toast.remove();
      noMovesShowing=false;
      busy=false;
      renderFull(null);
      resetHintTimer();
    });
  });
}
function shuffleBoard(){
  var B=C.B;
  // {t, sp} 쌍 전체를 섞어서 스페셜 타일 보존
  var tiles=[];
  for(var r=0;r<B;r++)for(var c=0;c<B;c++) tiles.push({t:board[r][c].t, sp:board[r][c].sp});
  // Fisher-Yates
  for(var i=tiles.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=tiles[i]; tiles[i]=tiles[j]; tiles[j]=tmp;
  }
  var idx=0;
  for(var r2=0;r2<B;r2++)for(var c2=0;c2<B;c2++) board[r2][c2]={t:tiles[idx].t, sp:tiles[idx++].sp};
  // 셔플 후 초기 매치 없도록 (sp는 유지하면서 t만 재배치)
  var tries=0;
  while(findM().length>0&&tries++<200){
    // 재시도 시 t만 다시 섞되 sp 위치는 유지
    var justTypes=[];
    for(var r3=0;r3<B;r3++)for(var c3=0;c3<B;c3++) justTypes.push(board[r3][c3].t);
    for(var i2=justTypes.length-1;i2>0;i2--){
      var j2=Math.floor(Math.random()*(i2+1));
      var tmp2=justTypes[i2]; justTypes[i2]=justTypes[j2]; justTypes[j2]=tmp2;
    }
    var idx2=0;
    for(var r4=0;r4<B;r4++)for(var c4=0;c4<B;c4++) board[r4][c4].t=justTypes[idx2++];
  }
}

// ── 힌트 타이머 (5초 무입력 시 힌트 셀 강조) ──
var hintTimer=null, hintCells=[], hintAnim=null;
var idleWarnActive=false, idleWarnTimer=null;
function resetHintTimer(){
  clearHintTimer();
  if(!timerIv)return;
  hintTimer=setTimeout(function(){showHint();},5000);
}
function resetIdleWarn(){
  // 액션 발생 시 경고 해제
  idleWarnActive=false;
  if(idleWarnTimer){clearTimeout(idleWarnTimer);idleWarnTimer=null;}
  if(timerIv) idleWarnTimer=setTimeout(function(){
    if(timerIv){idleWarnActive=true;updMsg();}
  },5000);
}
function clearHintTimer(){
  if(hintTimer){clearTimeout(hintTimer);hintTimer=null;}
  hintCells=[];
  if(hintAnim){cancelAnimationFrame(hintAnim);hintAnim=null;}
  idleWarnActive=false;
  if(idleWarnTimer){clearTimeout(idleWarnTimer);idleWarnTimer=null;}
}
function showHint(){
  // 매치 가능한 첫 번째 쌍 찾기
  var B=C.B;
  for(var r=0;r<B;r++){
    for(var c=0;c<B;c++){
      if(c+1<B){
        swap2(r,c,r,c+1);
        var m=findM();
        swap2(r,c,r,c+1);
        if(m.length){hintCells=[{r:r,c:c},{r:r,c:c+1}];animHint();return;}
      }
      if(r+1<B){
        swap2(r,c,r+1,c);
        var m2=findM();
        swap2(r,c,r+1,c);
        if(m2.length){hintCells=[{r:r,c:c},{r:r+1,c:c}];animHint();return;}
      }
    }
  }
}
function animHint(){
  if(!hintCells.length)return;
  var t0=performance.now();
  var PERIOD=700; // 깜빡임 주기
  function frame(ts){
    if(!hintCells.length){renderFull(null);return;}
    renderFull(null);
    var phase=(ts-t0)/PERIOD*Math.PI*2;
    // 0.4~1.0 사이로 알파 진동 (완전히 사라지지 않게)
    var alpha=0.4+0.6*(Math.sin(phase)*0.5+0.5);
    hintCells.forEach(function(h){
      var bx=GAP+h.c*(CELL+GAP);
      var by=GAP+h.r*(CELL+GAP);
      var cell=board[h.r][h.c];
      if(cell&&cell.t>=0){
        // 먼저 해당 셀 배경으로 지우고 반투명으로 다시 그림
        CTX.fillStyle='#FCB17B';
        rrect(CTX,bx,by,CELL,CELL,CELL*0.18);CTX.fill();
        drawTile(CTX,cell.t,cell.sp,bx,by,CELL,alpha,1);
      }
    });
    hintAnim=requestAnimationFrame(frame);
  }
  hintAnim=requestAnimationFrame(frame);
}

function processChain(){
  var matched=findM();
  if(!matched.length){
    combo=0;busy=false;renderFull(null);
    if(!hasMoves()){showNoMoves();}else{resetHintTimer();}
    return;
  }
  combo++;bestCombo=Math.max(bestCombo,combo);
  if(combo>1)showCB(combo);

  // 매치에 스페셜 포함 여부
  var spCell=null;
  for(var i=0;i<matched.length;i++){
    var mc=board[matched[i].r][matched[i].c];
    if(mc.sp==='smile'||mc.sp==='food'){ spCell=matched[i]; break; }
  }

  if(spCell){
    var swapT=-1;
    for(var j=0;j<matched.length;j++){
      if(matched[j].r!==spCell.r||matched[j].c!==spCell.c){
        swapT=board[matched[j].r][matched[j].c].t; break;
      }
    }
    // 일반 매치 타일을 제거하지 않고 fireSpecial에 함께 전달
    // → 효과 범위 타일과 동시에 강조 후 같이 사라짐
    fireSpecial('single', spCell.r,spCell.c,-1,-1,
      board[spCell.r][spCell.c].sp,null,swapT,-1, matched);
    return;
  }

  // 일반 매치
  applyM(matched);
  animRemoveOnly(matched,function(){
    doDropAnim(function(){processChain();});
  });
}

// 매치된 타일만 팝→페이드, 나머지는 전혀 건드리지 않음
function animRemoveOnly(matched,cb){
  var mmap={};
  matched.forEach(function(m){
    var cell=board[m.r][m.c];
    if(cell.sp==='smile'||cell.sp==='food') return; // 스페셜 생성 셀 유지
    mmap[m.r+'_'+m.c]={r:m.r,c:m.c,t:cell.t,sp:null};
    board[m.r][m.c]={t:-1,sp:null};
  });

  var DUR=180, start=null;
  requestAnimationFrame(function anim(ts){
    if(!start) start=ts;
    var p=Math.min(1,(ts-start)/DUR);
    var sc=1+p*0.35, al=1-p;

    // 전체 보드 렌더 (스페셜 타일 포함)
    renderFull(null);

    // 제거되는 타일만 팝 애니메이션 덮어씌움
    for(var key in mmap){
      var m=mmap[key];
      var bx=GAP+m.c*(CELL+GAP), by=GAP+m.r*(CELL+GAP);
      CTX.save();
      CTX.translate(bx+CELL/2, by+CELL/2);
      CTX.scale(sc,sc);
      drawTile(CTX,m.t,m.sp,-CELL/2,-CELL/2,CELL,al,1);
      CTX.restore();
    }

    if(p<1){ requestAnimationFrame(anim); }
    else{ cb(); }
  });
}


// 낙하: 각 열별로 픽셀 오프셋 계산 후 easeOutBounce로 자연스럽게
function doDropAnim(cb){
  var B=C.B;
  var fallingCols={};

  // colMoves[col] = 각 row별 {t, sp, startDy}
  // startDy: 애니메이션 시작 시 현재 위치에서 얼마나 위에서 시작하는지 (음수)
  var colMoves=[];

  for(var col=0;col<B;col++){
    colMoves[col]=[];

    // 1) 현재 board에서 빈칸 위치 파악
    var emptyRows=[];
    for(var row=0;row<B;row++) if(board[row][col].t<0) emptyRows.push(row);

    if(emptyRows.length===0){
      // 빈칸 없는 열 → 모두 dy=0, board 그대로
      for(var row2=0;row2<B;row2++)
        colMoves[col].push({t:board[row2][col].t, sp:board[row2][col].sp, dy:0});
      continue;
    }

    fallingCols[col]=true;

    // 2) 각 기존 타일이 최종적으로 어느 row에 착지하는지 계산
    //    중력: 아래부터 빈칸을 채워 내려감
    //    existing 타일을 아래에서부터 채우고, 남은 위쪽은 새 타일
    var srcRows=[]; // 기존 타일의 원래 row (위→아래)
    for(var row3=0;row3<B;row3++) if(board[row3][col].t>=0) srcRows.push(row3);
    var emptyCount=B-srcRows.length;

    // 최종 배치: row 0..emptyCount-1 = 새타일, row emptyCount..B-1 = 기존타일 순서대로
    var newTiles=[];
    for(var ni=0;ni<emptyCount;ni++) newTiles.push({t:rnd(),sp:null});

    var finalTiles=[];
    // 새 타일
    for(var ni2=0;ni2<emptyCount;ni2++)
      finalTiles.push({t:newTiles[ni2].t, sp:null, dy: -((emptyCount-ni2)*(CELL+GAP))});
    // 기존 타일: srcRows[i]에서 최종위치 (emptyCount+i)로 이동
    for(var ei=0;ei<srcRows.length;ei++){
      var fromRow=srcRows[ei];
      var toRow=emptyCount+ei;
      var moveDist=toRow-fromRow; // 아래로 moveDist칸 이동 (양수)
      // 위에서 내려오는 것이므로 startDy = -(moveDist*(CELL+GAP))
      // moveDist=0이면 이동 없음(dy=0) → 하단 고정 타일
      finalTiles.push({
        t:board[fromRow][col].t,
        sp:board[fromRow][col].sp,
        dy: moveDist===0 ? 0 : -(moveDist*(CELL+GAP))
      });
    }

    // board 업데이트
    for(var row4=0;row4<B;row4++){
      board[row4][col]={t:finalTiles[row4].t, sp:finalTiles[row4].sp};
      colMoves[col].push(finalTiles[row4]);
    }
  }

  // static 열 (빈칸 없는 열) + 낙하 열 중 dy=0인 타일 → offscreen에 미리 그림
  var offscreen=document.createElement('canvas');
  offscreen.width=BPX; offscreen.height=BPX;
  var offCtx=offscreen.getContext('2d');
  offCtx.fillStyle='#FCB17B';
  rrect(offCtx,0,0,BPX,BPX,16); offCtx.fill();

  for(var col2=0;col2<B;col2++){
    for(var row5=0;row5<B;row5++){
      var mv=colMoves[col2][row5];
      if(!mv||mv.t<0) continue;
      if(mv.dy===0){
        // 고정 타일 → offscreen에 미리 그림
        drawTile(offCtx,mv.t,mv.sp,GAP+col2*(CELL+GAP),GAP+row5*(CELL+GAP),CELL,1,1);
      }
    }
  }

  var DUR=240, start=null;
  requestAnimationFrame(function anim(ts){
    if(!start) start=ts;
    var p=Math.min(1,(ts-start)/DUR);
    var ep=1-Math.pow(1-p,3);

    CTX.clearRect(0,0,BPX,BPX);
    CTX.drawImage(offscreen,0,0); // 고정 타일 복사

    // dy!=0인 타일만 현재 위치 계산해서 그리기
    for(var col3=0;col3<B;col3++){
      for(var row6=0;row6<B;row6++){
        var mv2=colMoves[col3][row6];
        if(!mv2||mv2.t<0||mv2.dy===0) continue;
        var bx=GAP+col3*(CELL+GAP);
        var by=GAP+row6*(CELL+GAP)+mv2.dy*(1-ep);
        drawTile(CTX,mv2.t,mv2.sp,bx,by,CELL,1,1);
      }
    }

    if(p<1){ requestAnimationFrame(anim); }
    else{ initAnims(); renderFull(null); cb(); }
  });
}

function rnd(){return Math.floor(Math.random()*C.N);}
function mkBoard(){
  board=[];
  for(var r=0;r<C.B;r++){board[r]=[];for(var c=0;c<C.B;c++)board[r][c]={t:rnd(),sp:null};}
  var tries=0;while(findM().length>0&&tries++<500)for(var r2=0;r2<C.B;r2++)for(var c2=0;c2<C.B;c2++)board[r2][c2].t=rnd();
}
function findM(){
  var set={},B=C.B;
  for(var r=0;r<B;r++){var run=1;for(var c=1;c<=B;c++){var ok=c<B&&board[r][c].t>=0&&board[r][c].t===board[r][c-1].t;if(ok)run++;else{if(run>=3)for(var k=c-run;k<c;k++)set[r*B+k]=1;run=1;}}}
  for(var c3=0;c3<B;c3++){var run2=1;for(var r3=1;r3<=B;r3++){var ok2=r3<B&&board[r3][c3].t>=0&&board[r3][c3].t===board[r3-1][c3].t;if(ok2)run2++;else{if(run2>=3)for(var k2=r3-run2;k2<r3;k2++)set[k2*B+c3]=1;run2=1;}}}
  var res=[];for(var key in set){var i=parseInt(key,10);res.push({r:Math.floor(i/B),c:i%B});}return res;
}
function maxRun(matched){
  // 같은 타입별로 최대 런 계산
  var B=C.B, max=0;
  var typeMap={};
  matched.forEach(function(m){
    var t=board[m.r][m.c].t; if(t<0) return;
    if(!typeMap[t]) typeMap[t]={};
    typeMap[t][m.r*B+m.c]=1;
  });
  for(var tk in typeMap){
    var set=typeMap[tk];
    for(var r=0;r<B;r++){var run=0;for(var c=0;c<B;c++){run=set[r*B+c]?run+1:0;if(run>max)max=run;}}
    for(var c2=0;c2<B;c2++){var run2=0;for(var r2=0;r2<B;r2++){run2=set[r2*B+c2]?run2+1:0;if(run2>max)max=run2;}}
  }
  return Math.max(3,max);
}
function applyM(matched){
  var B=C.B, mr=maxRun(matched), spPos=null;
  var mlen=matched.length;

  // ── spPos 결정: 같은 타입의 연속 런이 4개 이상일 때만 스페셜 ──
  // 치킨3+커피3 같은 다른 타입 혼합은 스페셜 아님
  // findM이 반환하는 matched는 같은 타입 연속 3개 이상의 합집합이므로
  // 타입별로 분리해서 각각 스페셜 조건 체크
  var typeGroups={};
  matched.forEach(function(m){
    var t=board[m.r][m.c].t;
    if(t<0) return;
    if(!typeGroups[t]) typeGroups[t]=[];
    typeGroups[t].push(m);
  });

  for(var tKey in typeGroups){
    var grp=typeGroups[tKey];
    if(grp.length<4) continue; // 같은 타입 4개 미만이면 스페셜 없음
    var mset={};
    grp.forEach(function(m){mset[m.r*B+m.c]=1;});
    var bestScore=-1, bestCell=null, bestMaxRun=0;
    grp.forEach(function(m){
      var hrun=0; for(var cc3=0;cc3<B;cc3++) if(mset[m.r*B+cc3]) hrun++;
      var vrun=0; for(var rr3=0;rr3<B;rr3++) if(mset[rr3*B+m.c]) vrun++;
      var sc=hrun+vrun-(mset[m.r*B+m.c]?1:0);
      var mx=Math.max(hrun,vrun);
      if(sc>bestScore||(sc===bestScore&&mx>bestMaxRun)){
        bestScore=sc; bestCell={r:m.r,c:m.c}; bestMaxRun=grp.length;
      }
    });
    if(bestCell){ spPos={r:bestCell.r,c:bestCell.c,len:grp.length}; break; }
  }

  matched.forEach(function(m){
    if(board[m.r][m.c].t<0) return;
    var isSp=spPos&&m.r===spPos.r&&m.c===spPos.c;
    if(isSp){
      // 5개 이상 or 교차형(가로+세로 모두 2개 이상) → food, 그외 → smile
      var mset2={};matched.forEach(function(m2){mset2[m2.r*B+m2.c]=1;});
      var hr=0,vr=0;
      for(var cc4=0;cc4<B;cc4++) if(mset2[m.r*B+cc4]) hr++;
      for(var rr4=0;rr4<B;rr4++) if(mset2[rr4*B+m.c]) vr++;
      var isFood=(mlen>=5)||(hr>=2&&vr>=2); // T/L/십자형도 food
      board[m.r][m.c].sp=isFood?'food':'smile';
    } else {
      if(board[m.r][m.c].t>=0) mcnt[board[m.r][m.c].t]++;
    }
  });

  var len=matched.length, pts=len>=5?C.S5:len===4?C.S4:C.S3;
  var cm=combo, mult=cm>=5?3:cm>=4?2.5:cm>=3?2:cm>=2?1.5:1;
  pts=Math.round(pts*mult); score+=pts;
  var addT=0, msg='', col='#ddd';
  // 스페셜 생성 여부에 따라 메시지/사운드
  if(spPos){
    var isFood2=(len>=5)||(() => {
      var mset3={};matched.forEach(function(m){mset3[m.r*B+m.c]=1;});
      var hr2=0,vr2=0;
      for(var cc5=0;cc5<B;cc5++) if(mset3[spPos.r*B+cc5]) hr2++;
      for(var rr5=0;rr5<B;rr5++) if(mset3[rr5*B+spPos.c]) vr2++;
      return hr2>=2&&vr2>=2;
    })();
    if(isFood2){addT=C.T5;msg='🔴 FOOD PANG 생성! +'+C.T5+'초';col='#D45E10';sfxFood();}
    else{addT=C.T4;msg='⭐ SMILE PANG 생성! +'+C.T4+'초';col='#FFD700';sfxSmile();}
  } else {
    addT=C.T3; msg='+'+C.T3+'초'; sfxM(len,cm);
  }
  if(cm>=5){addT+=C.TC5;msg='🔥 SUPER COMBO! +'+C.TC5+'초';col='#FF8C00';}
  else if(cm>=3) addT+=C.TC3;
  timeLeft=Math.min(C.MAX,timeLeft+addT);
  sfxT(); showTP(msg,col); if(matched[0]) showSP(pts,matched[0]); updTimerUI();
  document.getElementById('hud-score').textContent=score.toLocaleString();
}
function actSpecial(r,c,swapT){
  var sp=board[r][c].sp,B=C.B;
  if(!sp) return;
  board[r][c]={t:-1,sp:null}; // 먼저 제거
  if(sp==='smile'){
    for(var cc2=0;cc2<B;cc2++){
      if(board[r][cc2].t>=0){mcnt[board[r][cc2].t]++;board[r][cc2]={t:-1,sp:null};}
    }
    for(var rr2=0;rr2<B;rr2++){
      if(board[rr2][c].t>=0){mcnt[board[rr2][c].t]++;board[rr2][c]={t:-1,sp:null};}
    }
    timeLeft=Math.min(C.MAX,timeLeft+C.T4);
    sfxSmile();sfxT();
    showTP('⭐ SMILE PANG! +'+C.T4+'초','#FFD700');
    showBurst('smile',r,c);
    updTimerUI();
  } else if(sp==='food'){
    // swapT=-1이면 board에서 가장 많은 타입으로
    var tgt=swapT>=0?swapT:-1;
    if(tgt<0){
      var cnt=[];
      for(var ti=0;ti<C.N;ti++) cnt[ti]=0;
      for(var rr3=0;rr3<B;rr3++)for(var cc3=0;cc3<B;cc3++)if(board[rr3][cc3].t>=0)cnt[board[rr3][cc3].t]++;
      tgt=cnt.indexOf(Math.max.apply(null,cnt));
    }
    for(var rr4=0;rr4<B;rr4++)for(var cc4=0;cc4<B;cc4++){
      if(board[rr4][cc4].t===tgt){mcnt[tgt]++;board[rr4][cc4]={t:-1,sp:null};}
    }
    timeLeft=Math.min(C.MAX,timeLeft+C.T5);
    sfxFood();sfxT();
    showTP('🔴 FOOD PANG!! +'+C.T5+'초','#D45E10');
    showBurst('food',r,c);
    updTimerUI();
  }
}

function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function tone(f,dur,type,vol,delay){if(!audioCtx)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=type||'sine';o.frequency.value=f;var t=audioCtx.currentTime+(delay||0);g.gain.setValueAtTime(vol||0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}}
function sfxM(n,cb){var fs=[440,523,659,784,880],f=fs[Math.min(n-3,4)];tone(f,.12,'square',.18);if(cb>1)tone(f*1.25,.12,'square',.15,.1);if(cb>2)tone(f*1.5,.12,'square',.12,.2);}
function sfxSmile(){tone(880,.1,'square',.2);tone(1100,.12,'square',.18,.1);tone(1320,.15,'square',.15,.2);}
function sfxFood(){[440,554,659,784,880,1100].forEach(function(f,i){tone(f,.12,'sawtooth',.12,i*.06);});}
function sfxT(){tone(660,.07,'sine',.2);tone(880,.09,'sine',.18,.08);}
function sfxOver(){[440,392,349,294,220].forEach(function(f,i){tone(f,.18,'triangle',.18,i*.12);});}
function sfxFan(){[523,659,784,1047].forEach(function(f,i){tone(f,.18,'square',.18,i*.1);});}
var bgmOn=false;
function startBGM(){
  if(bgmOn||!audioCtx)return; bgmOn=true;
  // 빠른 8비트 팝 BGM - 140BPM
  var BPM=140, beat=60000/BPM, step=beat/2; // 16분음표
  // 멜로디 (C장조 밝은 진행)
  var mel=[523,659,784,659,523,587,698,587,
           523,659,784,880,784,698,659,523,
           587,698,784,880,1047,880,784,698,
           659,784,659,523,587,523,494,523];
  // 베이스라인
  var bas=[131,131,165,131,147,147,175,147];
  var mi=0, bi=0, tick16=0;
  (function loop(){
    if(!bgmOn)return;
    var t=audioCtx.currentTime;
    var dur=step/1000*0.8;
    // 멜로디: 매 16분음표
    tone(mel[mi%mel.length], dur, 'square', 0.055, 0);
    // 베이스: 매 8분음표(2스텝마다)
    if(tick16%2===0) tone(bas[bi%bas.length], dur*1.8, 'triangle', 0.07, 0);
    // 하이햇: 매 16분음표
    (function(){
      var nd=audioCtx.createOscillator(), gn=audioCtx.createGain();
      nd.connect(gn); gn.connect(audioCtx.destination);
      nd.type='sawtooth'; nd.frequency.value=8000+Math.random()*4000;
      gn.gain.setValueAtTime(0.025,t); gn.gain.exponentialRampToValueAtTime(0.001,t+0.04);
      nd.start(t); nd.stop(t+0.04);
    })();
    // 킥: 매 박자(4스텝마다)
    if(tick16%4===0){
      var kd=audioCtx.createOscillator(), kg=audioCtx.createGain();
      kd.connect(kg); kg.connect(audioCtx.destination);
      kd.type='sine'; kd.frequency.setValueAtTime(200,t);
      kd.frequency.exponentialRampToValueAtTime(40,t+0.08);
      kg.gain.setValueAtTime(0.18,t); kg.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      kd.start(t); kd.stop(t+0.1);
    }
    // 스네어: 2,6번째 박자
    if(tick16%8===4){
      var sn=audioCtx.createOscillator(), sg=audioCtx.createGain();
      var sn2=audioCtx.createBufferSource();
      sn.connect(sg); sg.connect(audioCtx.destination);
      sn.type='triangle'; sn.frequency.value=200;
      sg.gain.setValueAtTime(0.1,t); sg.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      sn.start(t); sn.stop(t+0.06);
    }
    mi++; if(tick16%2===0) bi++;
    tick16++;
    setTimeout(loop, step);
  })();
}

// ── 스페셜 팡 폭발 이펙트 ──
function showBurst(type, r, c){
  if(!CV) return;
  var rect=CV.getBoundingClientRect();
  var cx2, cy2;
  if(type==='perfect'){
    cx2=rect.left+rect.width/2; cy2=rect.top+rect.height/2;
  } else {
    cx2=rect.left+GAP+c*(CELL+GAP)+CELL/2;
    cy2=rect.top+GAP+r*(CELL+GAP)+CELL/2;
  }
  var colors = type==='smile'
    ? ['#F07820','#F9D45B','#FFB347','#FFAA00','#fff']
    : type==='food'
    ? ['#D45E10','#FF6688','#FF0033','#FFB8C8','#fff']
    : ['#F07820','#F9D45B','#FF9A40','#D45E10','#fff'];
  // 파티클 생성
  var particles=[];
  var count = type==='perfect'?30:18;
  for(var i=0;i<count;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=(type==='perfect'?3:2)+Math.random()*3;
    particles.push({
      x:cx2, y:cy2,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2,
      r:3+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:1, decay:0.03+Math.random()*0.02,
      rot:Math.random()*Math.PI*2,
      shape:Math.random()>0.5?'circle':'star'
    });
  }
  // 오버레이 canvas
  var ov=document.createElement('canvas');
  ov.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:180;width:100%;height:100%';
  ov.width=window.innerWidth; ov.height=window.innerHeight;
  document.body.appendChild(ov);
  var octx=ov.getContext('2d');
  var start=null;
  var DUR=type==='perfect'?1000:700;
  // 중앙 섬광
  if(type==='food'||type==='perfect'){
    octx.save();
    octx.fillStyle=type==='perfect'?'rgba(255,255,255,0.25)':'rgba(255,34,85,0.2)';
    octx.fillRect(0,0,ov.width,ov.height);
    octx.restore();
  }
  requestAnimationFrame(function frame(ts){
    if(!start)start=ts;
    var p=Math.min(1,(ts-start)/DUR);
    octx.clearRect(0,0,ov.width,ov.height);
    particles.forEach(function(pt){
      if(pt.life<=0)return;
      pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.15; // 중력
      pt.life-=pt.decay; pt.rot+=0.1;
      octx.save();
      octx.globalAlpha=Math.max(0,pt.life);
      octx.translate(pt.x,pt.y);
      octx.rotate(pt.rot);
      octx.fillStyle=pt.color;
      octx.shadowColor=pt.color; octx.shadowBlur=6;
      if(pt.shape==='star'){
        drawStar(octx,0,0,pt.r*1.5,pt.r*0.6,5);
        octx.fill();
      } else {
        octx.beginPath();octx.arc(0,0,pt.r,0,Math.PI*2);octx.fill();
      }
      octx.restore();
    });
    if(p<1)requestAnimationFrame(frame);
    else if(ov.parentNode)ov.remove();
  });
}
function drawStar(ctx,cx,cy,ro,ri,n){
  ctx.beginPath();
  for(var i=0;i<n*2;i++){
    var angle=i*Math.PI/n - Math.PI/2;
    var r2=i%2===0?ro:ri;
    if(i===0)ctx.moveTo(cx+Math.cos(angle)*r2,cy+Math.sin(angle)*r2);
    else ctx.lineTo(cx+Math.cos(angle)*r2,cy+Math.sin(angle)*r2);
  }
  ctx.closePath();
}

function startGame(){
  if(playsLeft<=0){showSc('empty');return;}
  playsLeft--;saveData();saveBest();updBadge();
  score=0;combo=0;bestCombo=0;busy=false;mcnt=new Array(C.N).fill(0);
  drag.on=false;drag.r=-1;drag.selR=-1;drag.selC=-1;
  initAudio();startBGM();
  // 플레이 화면 먼저 열고, 보드 초기화
  mkBoard();
  var wrap=document.querySelector('.board-wrap');
  var bw=wrap.clientWidth-16,bh=wrap.clientHeight-8;
  BPX=Math.min(bw,bh);
  CELL=Math.floor((BPX-GAP*(C.B+1))/C.B);
  BPX=CELL*C.B+GAP*(C.B+1);
  CV=document.getElementById('board-canvas');
  CV.width=BPX;CV.height=BPX;
  CV.style.width=BPX+'px';CV.style.height=BPX+'px';
  CTX=CV.getContext('2d');
  initAnims();initGhost();
  CV.addEventListener('pointerdown',onDown,{passive:false});
  CV.addEventListener('pointermove',onMove,{passive:false});
  CV.addEventListener('pointerup',onUp,{passive:false});
  CV.addEventListener('pointercancel',onUp,{passive:false});
  CV.style.touchAction='none';
  showSc('play');renderFull(null); // 보드 먼저 보여줌
  // 카운트다운 오버레이
  var ov=document.getElementById('cd-overlay');
  var playScr=document.getElementById('screen-play');
  ov.classList.add('active');
  playScr.classList.add('cd-active');
  var n=3,cd=document.getElementById('cd-num');
  function tick(){cd.textContent=n;cd.style.animation='none';void cd.offsetWidth;cd.style.animation='cdp 1s cubic-bezier(.34,1.56,.64,1)';}tick();
  var iv=setInterval(function(){
    n--;
    if(n<=0){
      clearInterval(iv);
      ov.classList.remove('active');
      playScr.classList.remove('cd-active');
      startTimer(); resetHintTimer();
    } else tick();
  },1000);
}
function beginPlay(){
  mkBoard();
  var wrap=document.querySelector('.board-wrap');
  var bw=wrap.clientWidth-16,bh=wrap.clientHeight-8;
  BPX=Math.min(bw,bh);
  CELL=Math.floor((BPX-GAP*(C.B+1))/C.B);
  BPX=CELL*C.B+GAP*(C.B+1);
  CV=document.getElementById('board-canvas');
  CV.width=BPX;CV.height=BPX;
  CV.style.width=BPX+'px';CV.style.height=BPX+'px';
  CTX=CV.getContext('2d');
  initAnims();initGhost();
  // Pointer Events API — touch/mouse 통합, setPointerCapture로 canvas 밖도 추적
  CV.addEventListener('pointerdown', onDown, {passive:false});
  CV.addEventListener('pointermove', onMove, {passive:false});
  CV.addEventListener('pointerup',   onUp,   {passive:false});
  CV.addEventListener('pointercancel',onUp,  {passive:false});
  // 스크롤 방지
  CV.style.touchAction='none';
  showSc('play');renderFull(null);startTimer();resetHintTimer();
}
function endGame(){
  busy=true;stopBGM();stopTimer();clearHintTimer();saveBest();
  var ti=0;if(mcnt.length){var mx=Math.max.apply(null,mcnt);ti=Math.max(0,mcnt.indexOf(mx));}
  //
  //
  document.getElementById('st-sc').textContent=score.toLocaleString();
  document.getElementById('st-cb').textContent=bestCombo;
  // 최다매치 타일을 canvas에 그리기
  var rtcv=document.getElementById('result-tile-cv');
  if(rtcv){
    var rtctx=rtcv.getContext('2d');
    rtctx.clearRect(0,0,56,56);
    var rtimg=imgEls[ti];
    if(rtimg&&rtimg.complete&&rtimg.naturalWidth>0){
      rtctx.drawImage(rtimg,0,0,56,56);
    } else {
      rtctx.fillStyle=BG&&BG[ti]?BG[ti][0]:'#ccc';
      rtctx.fillRect(0,0,56,56);
      rtctx.font='bold 32px sans-serif';rtctx.textAlign='center';rtctx.textBaseline='middle';
      rtctx.fillText(EMOJ[ti],28,28);
    }
  }
  document.getElementById('em-bv').textContent=bestScore.toLocaleString()+'점';
  // 결과 버튼 조건부 노출
  var retryWrap=document.getElementById('retry-wrap');
  var retryBtn=document.getElementById('btn-retry');
  var shareBtn=document.getElementById('btn-share-result');
  var adBtn=document.getElementById('btn-ad-result');
  var badge=document.getElementById('retry-badge');
  if(playsLeft>0){
    retryWrap.style.display='block';
    shareBtn.style.display='none';
    adBtn.style.display='none';
    if(badge) badge.textContent='🎮 '+playsLeft+'번 남음';
  } else {
    retryWrap.style.display='none';
    shareBtn.style.display='block';
    adBtn.style.display='block';
  }
  showSc('result');
  if(score>=5000)sfxFan();else sfxOver();
}
