<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>우리팀 찾기 챌린지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg-top:#0A0F2E; --bg-bottom:#1C2248;
    --primary:#E8003D; --primary-light:#FF3B66;
    --secondary:#FFB800;
    --text:#FFFFFF; --text-secondary:#B8BFDA;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.14);
    --card-selected: rgba(232,0,61,0.22);
    --success:#2ED573; --danger:#FF4757;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Pretendard Variable', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    background:linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    color:var(--text);
    height:100dvh;
    overflow:hidden;
    display:flex; justify-content:center;
    position:relative;
    -webkit-user-select:none; user-select:none;
  }
  #app{
    width:100%; max-width:430px; height:100%;
    position:relative;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .screen{
    position:absolute; inset:0;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    display:flex; flex-direction:column;
    opacity:0; pointer-events:none;
    transform:translateY(12px);
  }
  .screen.active{
    opacity:1; pointer-events:auto;
    animation:slideUpFade 300ms cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes slideUpFade{
    from{opacity:0; transform:translateY(24px) scale(0.97);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .topbar{
    height:48px; display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; flex-shrink:0;
  }
  .mute-btn{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--card-border);
    background:var(--card-bg); color:var(--text); font-size:16px; cursor:pointer;
  }
  .plays-badge{
    height:28px; padding:0 12px; border-radius:999px;
    background:rgba(232,0,61,0.15); color:var(--secondary);
    font-size:12px; font-weight:600; display:flex; align-items:center; gap:4px;
  }
  h1.display{font-size:26px; font-weight:800; letter-spacing:-0.5px; margin:0 0 4px;}
  p.sub{font-size:14px; color:var(--text-secondary); margin:0 0 20px; line-height:1.5;}
  .reward-hint{
    display:inline-flex; align-items:center; gap:4px; height:28px; padding:0 12px; border-radius:999px;
    background:rgba(255,184,0,0.15); color:var(--secondary); font-size:12px; font-weight:700; margin-bottom:20px;
  }
  .content{flex:1; overflow-y:auto; padding:0 16px; -webkit-overflow-scrolling:touch;}
  .content::-webkit-scrollbar{display:none;}

  /* 메인: 팀 그리드 */
  .team-grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding-bottom:16px;
  }
  .team-card{
    background:var(--card-bg); border:1.5px solid var(--card-border);
    border-radius:16px; padding:14px 10px; text-align:center;
    transition:all 150ms; cursor:pointer;
  }
  .team-card.selected{
    border-color:var(--primary); background:var(--card-selected);
    box-shadow:0 4px 16px rgba(232,0,61,0.25);
  }
  .team-card svg{width:56px; height:64px;}
  .team-card .tname{font-size:13px; font-weight:600; margin-top:6px; line-height:1.3;}

  .cta-area{padding:12px 16px; flex-shrink:0;}
  .btn-primary{
    height:56px; width:100%; border:none; border-radius:16px;
    background:linear-gradient(135deg, var(--primary), var(--primary-light));
    color:#fff; font-size:17px; font-weight:700; box-shadow:0 8px 20px rgba(232,0,61,0.4);
    transition:transform 150ms, box-shadow 150ms, opacity 150ms;
  }
  .btn-primary:active{transform:scale(0.97); box-shadow:0 4px 12px rgba(232,0,61,0.3);}
  .btn-primary:disabled{opacity:0.35; box-shadow:none;}
  .btn-secondary{
    height:48px; width:100%; background:transparent; border:none;
    color:var(--text-secondary); font-size:15px; font-weight:600;
  }
  .btn-secondary:disabled{opacity:0.3;}
  .btn-ad{
    height:60px; width:100%; border:none; border-radius:16px;
    background:linear-gradient(135deg, var(--secondary), #FFD046);
    color:#1a1000; font-size:17px; font-weight:800;
    box-shadow:0 0 0 2px rgba(255,184,0,0.35), 0 10px 24px rgba(255,184,0,0.45);
    animation:pulseGlow 1.4s ease-in-out infinite;
  }
  .btn-ad:active{transform:scale(0.97);}
  @keyframes pulseGlow{
    0%,100%{box-shadow:0 0 0 2px rgba(255,184,0,0.35), 0 10px 24px rgba(255,184,0,0.45);}
    50%{box-shadow:0 0 0 6px rgba(255,184,0,0.15), 0 10px 30px rgba(255,184,0,0.7);}
  }

  /* 카운트다운 */
  #screen-countdown .content{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .countdown-num{font-size:96px; font-weight:800; letter-spacing:-2px; font-family:'Pretendard Variable', monospace;}
  .countdown-guide{font-size:16px; color:var(--text-secondary); margin-top:8px;}
  .countdown-target{display:flex; flex-direction:column; align-items:center; margin-bottom:24px;}
  .countdown-target svg{width:70px; height:80px;}

  /* 플레이 */
  #screen-play .content{display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .play-hud{
    display:flex; justify-content:space-between; width:100%; padding:0 16px; flex-shrink:0;
  }
  .hud-card{
    border-radius:12px; background:rgba(232,0,61,0.1); border:1px solid rgba(232,0,61,0.2);
    padding:10px 14px; backdrop-filter:blur(8px); text-align:center;
  }
  .hud-card .label{font-size:11px; color:var(--text-secondary);}
  .hud-card .value{font-size:20px; font-weight:800; font-family:'Pretendard Variable', monospace;}
  .timer-bar-wrap{height:6px; background:rgba(255,255,255,0.12); border-radius:999px; margin:10px 16px 0; overflow:hidden; flex-shrink:0;}
  .timer-bar{height:100%; background:linear-gradient(90deg, var(--secondary), var(--primary)); width:100%; transition:width 100ms linear;}
  .slot-zone{
    flex:1; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    touch-action:none;
  }
  .slot-frame{
    width:200px; height:220px; border-radius:24px;
    background:var(--card-bg); border:2px solid var(--card-border);
    display:flex; align-items:center; justify-content:center;
    transition:border-color 120ms, background 120ms;
  }
  .slot-frame svg{width:150px; height:170px;}
  .slot-frame.flash-good{border-color:var(--success); background:rgba(46,213,115,0.18);}
  .slot-frame.flash-bad{border-color:var(--danger); background:rgba(255,71,87,0.18);}
  .tap-hint{margin-top:20px; font-size:15px; font-weight:600; color:var(--text-secondary);}
  .round-toast{
    position:absolute; top:90px; left:50%; transform:translateX(-50%);
    font-size:20px; font-weight:800; color:var(--success); opacity:0; pointer-events:none;
  }
  .round-toast.show{animation:score-pop 500ms ease-out both;}
  .round-toast.bad{color:var(--danger);}
  @keyframes score-pop{
    0%{opacity:0; transform:translateX(-50%) scale(0.8) translateY(10px);}
    30%{opacity:1; transform:translateX(-50%) scale(1.25) translateY(0);}
    100%{opacity:0; transform:translateX(-50%) scale(1) translateY(-10px);}
  }

  /* 결과 */
  #screen-result .content{padding-top:16px;}
  .result-score{
    text-align:center; margin-bottom:8px;
  }
  .result-score .label{font-size:14px; color:var(--text-secondary);}
  .result-score .num{
    font-size:48px; font-weight:800; letter-spacing:-1px; font-family:'Pretendard Variable', monospace;
    animation:score-pop-in 500ms cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes score-pop-in{
    0%{transform:scale(0.6); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;}
  }
  .best-badge{
    text-align:center; color:var(--secondary); font-weight:700; font-size:14px; margin-bottom:16px;
    animation:slide-up-fade 400ms both;
  }
  .reward-badge{
    text-align:center; color:#1a1000; font-weight:800; font-size:15px; margin-bottom:16px;
    background:linear-gradient(135deg, var(--secondary), #FFD046);
    border-radius:12px; padding:10px; animation:slide-up-fade 400ms both;
  }
  .share-preview{display:flex; justify-content:center; margin:12px 0;}
  .share-preview canvas{border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,0.4); width:180px; height:225px;}
  .result-btns{padding:0 16px 12px; display:flex; flex-direction:column; gap:8px;}

  .confetti{position:absolute; top:0; left:0; width:8px; height:14px; opacity:0.9; pointer-events:none;}

  .modal-overlay{
    position:absolute; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 200ms; z-index:20;
  }
  .modal-overlay.show{opacity:1; pointer-events:auto;}
  .modal-box{
    background:#161B3D; border:1px solid var(--card-border); border-radius:20px; padding:32px 24px;
    text-align:center; width:80%;
  }
  .modal-box .spinner{
    width:36px; height:36px; border-radius:50%; border:4px solid rgba(255,184,0,0.25);
    border-top-color:var(--secondary); margin:0 auto 16px; animation:spin 800ms linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">

  <!-- 메인 화면 -->
  <div class="screen active" id="screen-main">
    <div class="topbar">
      <span class="plays-badge" id="mainPlaysBadge">오늘 3/3</span>
      <button class="mute-btn" id="muteBtn">🔊</button>
    </div>
    <div class="content">
      <h1 class="display">우리팀 찾기 챌린지</h1>
      <p class="sub">응원하는 구단을 먼저 고르고, 빠르게 지나가는 래키 중에서<br>내 팀이 나오는 순간 탭하세요!</p>
      <div class="reward-hint">🎁 우리팀을 찾으면 1P 적립!</div>
      <div class="team-grid" id="teamGrid"></div>
    </div>
    <div class="cta-area">
      <button class="btn-primary" id="startBtn" disabled>응원팀을 선택해주세요</button>
      <button class="btn-ad" id="shareStartBtn" style="display:none; margin-top:8px;">🔗 공유하고 도전하기</button>
    </div>
  </div>

  <!-- 카운트다운 화면 -->
  <div class="screen" id="screen-countdown">
    <div class="content">
      <div class="countdown-target">
        <svg id="targetMascotSlot"></svg>
        <div class="countdown-guide" id="targetName"></div>
      </div>
      <div class="countdown-num" id="countdownNum">3</div>
      <div class="countdown-guide">이 팀이 나오면 화면을 탭!</div>
      <div class="reward-hint" style="margin-top:16px;">🎁 우리팀을 찾으면 1P 적립!</div>
    </div>
  </div>

  <!-- 플레이 화면 -->
  <div class="screen" id="screen-play">
    <div class="play-hud">
      <div class="hud-card"><div class="label">남은시간</div><div class="value" id="timeVal">10.0s</div></div>
      <div class="hud-card"><div class="label">점수</div><div class="value" id="scoreVal">0</div></div>
      <div class="hud-card"><div class="label">기회</div><div class="value" id="livesVal">❤️❤️❤️</div></div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
    <div class="round-toast" id="roundToast">GOOD!</div>
    <div class="slot-zone" id="tapZone">
      <div class="slot-frame" id="slotFrame"></div>
      <div class="tap-hint">우리팀 래키가 나오면 화면을 탭하세요</div>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div class="screen" id="screen-result">
    <div class="topbar"><span></span><button class="mute-btn" id="muteBtn2">🔊</button></div>
    <div class="content">
      <div class="result-score">
        <div class="label">최종 점수</div>
        <div class="num" id="finalScore">0</div>
      </div>
      <div class="best-badge" id="bestBadge" style="display:none;">🎉 최고 기록 달성!</div>
      <div class="reward-badge" id="rewardBadge" style="display:none;">🎁 1P 적립 완료!</div>
      <div class="share-preview"><canvas id="shareCanvas" width="240" height="300"></canvas></div>
    </div>
    <div class="result-btns">
      <button class="btn-ad" id="shareRetryBtn">🔗 공유하고 한번 더하기</button>
      <button class="btn-primary" id="retryBtn" style="background:linear-gradient(135deg,#2ED573,#26C063); box-shadow:0 8px 20px rgba(46,213,115,0.35);">🔁 한번 더하기</button>
    </div>
  </div>

  <div class="modal-overlay" id="adModal">
    <div class="modal-box">
      <div class="spinner"></div>
      <div style="font-weight:700; margin-bottom:4px;" id="modalTitle">공유 창을 여는 중...</div>
      <div style="font-size:13px; color:var(--text-secondary);">잠시만 기다려주세요</div>
    </div>
  </div>

</div>

<script>
/* ---------------- 데이터 ---------------- */
const TEAMS = [
  {id:'kia',   name:'기아 타이거즈', abbr:'KIA', color:'#EA0029', accent:'#1a1a1a'},
  {id:'samsung',name:'삼성 라이온즈', abbr:'SS',  color:'#0f4c9c', accent:'#c9ccd1'},
  {id:'lg',    name:'LG 트윈스',    abbr:'LG',  color:'#c30452', accent:'#0f1f4d'},
  {id:'doosan',name:'두산 베어스',   abbr:'DS',  color:'#131230', accent:'#e6002d'},
  {id:'kt',    name:'KT 위즈',      abbr:'KT',  color:'#111111', accent:'#e6002d'},
  {id:'ssg',   name:'SSG 랜더스',   abbr:'SSG', color:'#cf0a2c', accent:'#ffc72c'},
  {id:'lotte', name:'롯데 자이언츠', abbr:'LT',  color:'#041e42', accent:'#d0103a'},
  {id:'hanwha',name:'한화 이글스',   abbr:'HW',  color:'#ff6600', accent:'#111111'},
  {id:'nc',    name:'NC 다이노스',   abbr:'NC',  color:'#315288', accent:'#c4a354'},
  {id:'kiwoom',name:'키움 히어로즈', abbr:'KW',  color:'#5b0e1d', accent:'#8c0f2b'}
];
const MAX_PLAYS = 3;

function mascotSVG(t){
  // 흰 바탕 + 팀 컬러는 귀 끝, 헬멧 챙, 유니폼에만 포인트로 사용
  return `<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- 왼쪽 귀 -->
    <path d="M38 8 C30 8 24 20 25 38 C26 52 32 62 40 66 C42 50 42 30 44 12 C42 9 40 8 38 8 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M26 36 C27 26 31 16 37 10 L41 14 C36 20 33 29 32 38 Z" fill="${t.color}"/>
    <!-- 오른쪽 귀 -->
    <path d="M62 8 C70 8 76 20 75 38 C74 52 68 62 60 66 C58 50 58 30 56 12 C58 9 60 8 62 8 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M74 36 C73 26 69 16 63 10 L59 14 C64 20 67 29 68 38 Z" fill="${t.color}"/>
    <!-- 얼굴 -->
    <ellipse cx="50" cy="66" rx="34" ry="30" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- 왼쪽 수염 -->
    <path d="M8 60 L28 58" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <path d="M8 68 L28 68" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <!-- 오른쪽 수염 -->
    <path d="M72 58 L92 60" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <path d="M72 68 L92 68" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <!-- 눈 -->
    <circle cx="40" cy="62" r="4" fill="#1a1a1a"/>
    <circle cx="60" cy="62" r="4" fill="#1a1a1a"/>
    <!-- 입 (냐옹 w) -->
    <path d="M42 74 Q46 80 50 74 Q54 80 58 74" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
    <!-- 몸/유니폼 -->
    <rect x="24" y="98" width="52" height="30" rx="12" fill="${t.accent}" stroke="#1a1a1a" stroke-width="2"/>
    <text x="50" y="119" font-size="14" font-weight="800" fill="#fff" text-anchor="middle" font-family="Pretendard Variable, sans-serif">${t.abbr}</text>
    <!-- 헬멧 챙 포인트 -->
    <path d="M30 96 Q50 88 70 96" fill="none" stroke="${t.color}" stroke-width="5" stroke-linecap="round"/>
  </svg>`;
}

/* ---------------- 상태 ---------------- */
let selectedTeam = null;
let playsLeft = MAX_PLAYS;
let bonusPlays = 0; // 공유로 획득한 보너스 기회 (세션 내에서만 유지)
let score = 0, catchCount = 0, gameOver = false;
const MAX_LIVES = 3;
let lives = MAX_LIVES;
const GAME_DURATION_MS = 10000; // 10초
let timeLeft = GAME_DURATION_MS;
let queue = [], reelTimer = null, timerInterval = null, speed = 450;
let touchHandled = false;
let currentSlot = null, slotConsumed = false;
let appearCount = {}; // 게임 한 판 동안 팀별 누적 노출 횟수

/* ---------------- 로컬 저장 (일일 횟수 / 최고점 / 순위표) ---------------- */
function loadDaily(){
  const today = new Date().toDateString();
  const lastDate = localStorage.getItem('bb_lastDate');
  if(lastDate !== today){
    localStorage.setItem('bb_lastDate', today);
    localStorage.setItem('bb_playsLeft', String(MAX_PLAYS));
  }
  playsLeft = parseInt(localStorage.getItem('bb_playsLeft') || String(MAX_PLAYS));
}
function savePlays(){ localStorage.setItem('bb_playsLeft', String(playsLeft)); }
function getBest(){ return parseInt(localStorage.getItem('bb_best') || '0'); }
function setBest(v){ localStorage.setItem('bb_best', String(v)); }

/* ---------------- 화면 전환 ---------------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------------- 사운드 (Web Audio) ---------------- */
let audioCtx = null, muted = false, bgmTimer = null, bgmStep = 0;
function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
}
function beep(freq, dur, type='sine', vol=0.15, delay=0){
  if(muted) return;
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime + delay;
  o.start(t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.stop(t+dur+0.02);
}
function sfxCountdown(){ beep(440,0.12,'square',0.1); }
function sfxSuccess(){ beep(660,0.08,'triangle',0.14); beep(880,0.12,'triangle',0.14,0.08); }
function sfxFail(){ beep(220,0.25,'sawtooth',0.15); beep(140,0.3,'sawtooth',0.15,0.1); }
function sfxBest(){ [523,659,784,1046].forEach((f,i)=>beep(f,0.18,'triangle',0.13,i*0.12)); }

function startBGM(){
  if(muted) return;
  stopBGM();
  const notes = [392,440,494,440,523,494,440,392];
  bgmStep = 0;
  bgmTimer = setInterval(()=>{
    if(!muted) beep(notes[bgmStep % notes.length], 0.18, 'triangle', 0.05);
    bgmStep++;
  }, 260);
}
function stopBGM(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }
function toggleMute(){
  muted = !muted;
  document.querySelectorAll('.mute-btn').forEach(b=>b.textContent = muted ? '🔇' : '🔊');
  if(muted) stopBGM(); else if(document.getElementById('screen-play').classList.contains('active')) startBGM();
}
document.getElementById('muteBtn').onclick = toggleMute;
document.getElementById('muteBtn2').onclick = toggleMute;

/* ---------------- 메인 화면 ---------------- */
function renderMain(){
  loadDaily();
  document.getElementById('mainPlaysBadge').textContent = `오늘 ${playsLeft}/${MAX_PLAYS}`;
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  TEAMS.forEach(t=>{
    const card = document.createElement('div');
    card.className = 'team-card' + (selectedTeam && selectedTeam.id===t.id ? ' selected':'');
    card.innerHTML = mascotSVG(t) + `<div class="tname">${t.name}</div>`;
    card.onclick = ()=>{
      ensureAudio();
      selectedTeam = t;
      renderMain();
      updateStartBtn();
    };
    grid.appendChild(card);
  });
}
function updateStartBtn(){
  const btn = document.getElementById('startBtn');
  const shareBtn2 = document.getElementById('shareStartBtn');
  const available = playsLeft > 0 || bonusPlays > 0;
  if(!selectedTeam){
    btn.disabled = true;
    btn.textContent = '응원팀을 선택해주세요';
    shareBtn2.style.display = 'none';
  } else if(!available){
    btn.disabled = true;
    btn.textContent = '오늘 도전 횟수를 모두 사용했어요';
    shareBtn2.style.display = 'block';
  } else {
    btn.disabled = false;
    btn.textContent = playsLeft > 0 ? `${selectedTeam.name} 응원 시작하기` : `보너스 기회로 시작하기`;
    shareBtn2.style.display = 'none';
  }
}
function consumePlay(){
  if(playsLeft > 0){ playsLeft--; savePlays(); }
  else if(bonusPlays > 0){ bonusPlays--; }
}
document.getElementById('startBtn').onclick = ()=>{
  if(!selectedTeam || !(playsLeft>0 || bonusPlays>0)) return;
  consumePlay();
  runCountdown();
};
function grantBonusPlay(onDone){
  // TODO: 실제 공유 기능은 추후 별도로 연동 예정. 지금은 임시로 버튼 클릭 시 바로 보너스 기회를 지급함.
  const modal = document.getElementById('adModal');
  const titleEl = document.getElementById('modalTitle');
  titleEl.textContent = '보너스 기회를 지급하는 중...';
  modal.classList.add('show');
  setTimeout(()=>{
    modal.classList.remove('show');
    bonusPlays++;
    onDone();
  }, 700);
}
document.getElementById('shareStartBtn').onclick = ()=>{
  if(!selectedTeam) return;
  grantBonusPlay(updateStartBtn);
};

/* ---------------- 카운트다운 ---------------- */
function runCountdown(){
  showScreen('screen-countdown');
  document.getElementById('targetMascotSlot').outerHTML = mascotSVG(selectedTeam).replace('<svg','<svg id="targetMascotSlot"');
  document.getElementById('targetName').textContent = selectedTeam.name;
  let n = 3;
  const numEl = document.getElementById('countdownNum');
  numEl.textContent = n;
  sfxCountdown();
  const t = setInterval(()=>{
    n--;
    if(n<=0){
      clearInterval(t);
      startPlay();
      return;
    }
    numEl.textContent = n;
    sfxCountdown();
  }, 1000);
}

/* ---------------- 플레이 (10초 동안 몇 번 정확히 맞추는지) ---------------- */
function resetAppearCount(){
  appearCount = {};
  TEAMS.forEach(t=>{ appearCount[t.id] = 0; });
}
// 큐가 부족할 때마다 호출: 응원팀은 배치에 2번, 나머지는 덜 나온 팀부터 채워 균등 분배
function refillQueue(){
  const others = TEAMS.filter(t=>t.id!==selectedTeam.id);
  const batchLen = 12;
  const otherSlotsNeeded = batchLen - 2;
  let base = others.slice().sort(()=>Math.random()-0.5);
  const extraCount = otherSlotsNeeded - base.length;
  let extras = [];
  if(extraCount > 0){
    const sortedByLeastShown = others.slice().sort((a,b)=>(appearCount[a.id]||0) - (appearCount[b.id]||0));
    extras = sortedByLeastShown.slice(0, extraCount);
  }
  const arr = base.concat(extras).sort(()=>Math.random()-0.5);
  while(arr.length < otherSlotsNeeded){ arr.push(others[Math.floor(Math.random()*others.length)]); }
  arr.forEach(t=>{ appearCount[t.id] = (appearCount[t.id]||0) + 1; });

  let idx1 = 2 + Math.floor(Math.random()*2);
  let idx2 = idx1 + 4 + Math.floor(Math.random()*3);
  if(idx2 >= batchLen) idx2 = batchLen-1;
  arr.splice(idx2, 0, selectedTeam);
  arr.splice(idx1, 0, selectedTeam);
  queue.push(...arr.slice(0, batchLen));
}
function startPlay(){
  showScreen('screen-play');
  startBGM();
  gameOver = false;
  score = 0; catchCount = 0; lives = MAX_LIVES;
  timeLeft = GAME_DURATION_MS;
  speed = 450;
  queue = [];
  resetAppearCount();
  updateLivesUI();
  document.getElementById('scoreVal').textContent = score;
  updateTimerUI();
  timerInterval = setInterval(()=>{
    if(gameOver) return;
    timeLeft -= 100;
    if(timeLeft <= 0){
      timeLeft = 0;
      updateTimerUI();
      endGame('timeup');
      return;
    }
    updateTimerUI();
    // 시간이 지날수록 살짝 빨라짐 (최저 200ms)
    speed = Math.max(200, 450 - Math.floor((GAME_DURATION_MS-timeLeft)/1000)*25);
  }, 100);
  tick();
}
function updateTimerUI(){
  document.getElementById('timeVal').textContent = (timeLeft/1000).toFixed(1) + 's';
  document.getElementById('timerBar').style.width = (timeLeft/GAME_DURATION_MS*100) + '%';
}
function updateLivesUI(){
  document.getElementById('livesVal').textContent = '❤️'.repeat(lives) + '🖤'.repeat(MAX_LIVES-lives);
}
function showToast(text, ok){
  const toast = document.getElementById('roundToast');
  toast.classList.remove('show','bad');
  toast.textContent = text;
  if(!ok) toast.classList.add('bad');
  void toast.offsetWidth;
  toast.classList.add('show');
}
function tick(){
  if(gameOver) return;
  if(queue.length < 3) refillQueue();
  currentSlot = queue.shift();
  slotConsumed = false;
  const frame = document.getElementById('slotFrame');
  frame.classList.remove('flash-good','flash-bad');
  frame.innerHTML = mascotSVG(currentSlot);
  reelTimer = setTimeout(tick, speed);
}
function onTap(){
  if(gameOver || slotConsumed) return;
  touchHandled = true;
  slotConsumed = true;
  if(currentSlot && currentSlot.id === selectedTeam.id){
    handleCatch();
  } else {
    handleMiss();
  }
}
document.getElementById('tapZone').addEventListener('touchstart', (e)=>{ e.preventDefault(); onTap(); }, {passive:false});
document.getElementById('tapZone').addEventListener('click', ()=>{ if(!touchHandled) onTap(); touchHandled=false; });

function handleCatch(){
  const frame = document.getElementById('slotFrame');
  frame.classList.add('flash-good');
  sfxSuccess();
  catchCount++;
  score = catchCount * 100;
  document.getElementById('scoreVal').textContent = score;
  showToast('GOOD! +100', true);
}
function handleMiss(){
  const frame = document.getElementById('slotFrame');
  frame.classList.add('flash-bad');
  sfxFail();
  lives--;
  updateLivesUI();
  if(lives <= 0){
    endGame('nolives');
  } else {
    showToast('MISS! 남은 기회 ' + lives, false);
  }
}
function endGame(reason){
  if(gameOver) return;
  gameOver = true;
  clearTimeout(reelTimer);
  clearInterval(timerInterval);
  stopBGM();
  if(reason==='nolives') sfxFail();
  setTimeout(showResult, 500);
}

/* ---------------- 결과 화면 ---------------- */
function drawShareCanvas(){
  const c = document.getElementById('shareCanvas');
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,0,c.height);
  g.addColorStop(0, selectedTeam.color);
  g.addColorStop(1, '#0A0F2E');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = '700 13px Pretendard Variable, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('우리팀 찾기 챌린지', c.width/2, 30);

  ctx.fillStyle = '#fff';
  ctx.font = '800 20px Pretendard Variable, sans-serif';
  ctx.fillText(selectedTeam.name, c.width/2, 60);

  ctx.fillStyle = selectedTeam.accent;
  ctx.beginPath();
  ctx.arc(c.width/2, 130, 45, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '800 24px Pretendard Variable, sans-serif';
  ctx.fillText(selectedTeam.abbr, c.width/2, 138);

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '400 12px Pretendard Variable, sans-serif';
  ctx.fillText('최종 점수', c.width/2, 205);

  ctx.fillStyle = '#FFB800';
  ctx.font = '800 40px Pretendard Variable, monospace';
  ctx.fillText(String(score), c.width/2, 245);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '400 11px Pretendard Variable, sans-serif';
  ctx.fillText('#우리팀찾기챌린지', c.width/2, 280);
}
function spawnConfetti(){
  const app = document.getElementById('app');
  const colors = [selectedTeam.color, '#FFB800', '#ffffff'];
  for(let i=0;i<28;i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100 + '%';
    el.style.top = '-20px';
    el.style.background = colors[i % colors.length];
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    app.appendChild(el);
    const duration = 1400 + Math.random()*900;
    const drift = (Math.random()-0.5)*120;
    el.animate([
      {transform:`translate(0,0) rotate(0deg)`, opacity:1},
      {transform:`translate(${drift}px, ${window.innerHeight}px) rotate(720deg)`, opacity:0.9}
    ], {duration, easing:'ease-in'});
    setTimeout(()=>el.remove(), duration+50);
  }
}
function grantReward(){
  // 포인트 적립 API placeholder: 실제 연동 시 이 지점에서 서버에 1P 적립 요청
  console.log('1P 적립 요청 (score=' + score + ')');
}
function showResult(){
  showScreen('screen-result');
  document.getElementById('finalScore').textContent = score;
  const best = getBest();
  const bestBadge = document.getElementById('bestBadge');
  if(score > best){
    setBest(score);
    bestBadge.style.display = 'block';
    setTimeout(()=>{ spawnConfetti(); sfxBest(); }, 250);
  } else {
    bestBadge.style.display = 'none';
  }
  const rewardBadge = document.getElementById('rewardBadge');
  if(score >= 100){
    rewardBadge.style.display = 'block';
    grantReward();
  } else {
    rewardBadge.style.display = 'none';
  }
  drawShareCanvas();
  updateResultButtons();
}
function updateResultButtons(){
  loadDaily();
  const retryBtn = document.getElementById('retryBtn');
  const available = playsLeft > 0 || bonusPlays > 0;
  retryBtn.disabled = !available;
  retryBtn.style.opacity = available ? '1' : '0.35';
  if(playsLeft > 0){
    retryBtn.textContent = `🔁 한번 더하기 (${playsLeft}/${MAX_PLAYS})`;
  } else if(bonusPlays > 0){
    retryBtn.textContent = `🔁 한번 더하기 (보너스 ${bonusPlays})`;
  } else {
    retryBtn.textContent = '🔁 한번 더하기 (횟수 소진)';
  }
}
document.getElementById('retryBtn').onclick = ()=>{
  if(!(playsLeft>0 || bonusPlays>0)) return;
  consumePlay();
  runCountdown();
};
document.getElementById('shareRetryBtn').onclick = ()=>{
  grantBonusPlay(updateResultButtons);
};

/* ---------------- 초기화 ---------------- */
loadDaily();
renderMain();
updateStartBtn();
</script>
